<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교사 호출 시스템 - 장유고등학교</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #020617;
            --sidebar-bg: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --card-bg: #1e293b;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --accent: #10b981; 
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --nav-width: 280px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; background-color: var(--bg); color: var(--text-main);
            display: flex; height: 100vh; width: 100vw; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* 로그인 오버레이 */
        #login-overlay {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            display: flex; justify-content: center; align-items: center; z-index: 5000;
        }
        .login-box {
            background: var(--sidebar-bg); padding: 2rem; border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 400px; text-align: center;
        }
        .login-box input {
            width: 100%; padding: 1rem; margin-bottom: 0.8rem; background: #1e293b;
            border: 1px solid #334155; border-radius: 1rem; color: white; font-size: 1rem;
        }
        .login-box button {
            width: 100%; padding: 1rem; background: var(--primary); color: white;
            border: none; border-radius: 1rem; font-weight: 800; cursor: pointer; font-size: 1.1rem;
        }

        /* 사이드바 레이아웃 (반응형) */
        nav {
            width: var(--nav-width); background: var(--sidebar-bg); padding: 2rem 1rem;
            display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0; text-align: center; transition: all 0.3s ease;
        }

        @media (max-width: 1024px) {
            body { flex-direction: column; }
            nav { 
                width: 100%; height: auto; padding: 0.8rem; 
                flex-direction: row; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1);
                justify-content: space-around; align-items: center;
            }
            .sidebar-header { display: none; }
            .menu-item { margin-bottom: 0 !important; padding: 0.8rem !important; font-size: 0.9rem !important; flex: 1; }
            .logout-btn-wrap { display: none !important; }
            main { padding: 1rem !important; }
        }

        .sidebar-header { margin-bottom: 2.5rem; }
        .sidebar-header h1 { font-size: 1.4rem; font-weight: 800; margin: 0; color: white; }
        .sidebar-header p { font-size: 0.9rem; color: var(--text-dim); margin-top: 5px; }

        .menu-item {
            padding: 1rem; border-radius: 1rem; cursor: pointer; margin-bottom: 0.5rem;
            color: var(--text-dim); font-weight: 700; transition: 0.2s;
            font-size: 1rem; display: flex; align-items: center; justify-content: center;
            border: 1px solid transparent;
        }
        .menu-item:hover { background: rgba(255,255,255,0.05); }
        .menu-item.active { background: rgba(99, 102, 241, 0.15); border: 1px solid var(--primary); color: var(--primary); }

        /* 메인 컨텐츠 영역 */
        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; padding: 2rem; width: 100%; }

        /* 부서 대시보드 */
        #dashboard-view { flex: 1; display: flex; flex-direction: column; width: 100%; max-width: 1400px; margin: 0 auto; }
        .dashboard-title {
            text-align: center; font-size: 1.8rem; font-weight: 800; color: var(--accent);
            margin-bottom: 1.5rem; background: rgba(16, 185, 129, 0.1); padding: 12px; border-radius: 1rem;
        }
        #dept-dashboard {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1rem; overflow-y: auto; padding: 0.5rem;
        }
        .dept-card {
            background: var(--card-bg); padding: 2rem 1.5rem; border-radius: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05); cursor: pointer; text-align: center;
            transition: 0.2s;
        }
        .dept-card:active { transform: scale(0.95); }
        .dept-card h3 { font-size: 1.4rem; margin: 0; color: #fff; font-weight: 800; }

        /* 배치도 컨테이너 */
        #grid-view { flex: 1; display: none; flex-direction: column; height: 100%; width: 100%; }
        #grid-outer-container {
            flex: 1; width: 100%; height: 100%; position: relative;
            background: rgba(15, 23, 42, 0.5); border-radius: 1.5rem; 
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        #grid-wrapper { position: relative; display: inline-block; transition: transform 0.1s ease-out; transform-origin: center center; }
        #grid-container { display: grid; position: relative; z-index: 10; }

        /* 좌석 카드 */
        .seat-card {
            background: #1e293b; border-radius: 1rem; text-align: center;
            border: 2px solid #334155; display: flex; flex-direction: column; justify-content: center;
            transition: 0.2s; cursor: pointer; position: relative; z-index: 10; padding: 10px;
        }
        .seat-card h3 { font-size: 3rem; margin: 0; font-weight: 900; color: #fff; line-height: 1.1; }
        .seat-card p { font-size: 1.5rem; color: var(--primary); margin: 8px 0 0 0; font-weight: 800; }
        .seat-card.disabled { opacity: 0.3; pointer-events: none; filter: grayscale(1); }
        .seat-card.empty { background: rgba(255,255,255,0.02); border: 2px dashed rgba(255,255,255,0.1); cursor: default; }

        /* 파티션 */
        .partition { position: absolute; background: #64748b; z-index: 5; pointer-events: none; border-radius: 3px; }
        .partition-trigger { position: absolute; background: transparent; cursor: pointer; z-index: 30; display: none; }
        .edit-mode .partition-trigger { display: block; }

        /* 상단 헤더 반응형 조정 */
        #grid-header-row { display:flex; justify-content: space-between; align-items: center; margin-bottom:1rem; gap: 10px; }
        #view-title { margin:0; font-weight:900; font-size: 1.8rem; color: var(--primary); text-align: right; flex-grow: 1; }
        #back-btn { padding: 0.6rem 1rem; font-size: 0.9rem; white-space: nowrap; }

        /* 안내 문구 */
        #call-instruction {
            text-align: center; font-size: 1.2rem; font-weight: 700; color: var(--accent);
            margin-bottom: 1rem; background: rgba(16, 185, 129, 0.1); padding: 10px; border-radius: 0.8rem;
        }

        /* 팝업 (모바일 최적화) */
        #call-popup {
            display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98);
            z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
            border: 10px solid var(--primary); text-align: center; padding: 2rem;
        }
        .popup-content h1 { font-size: 5rem; margin: 0; color: white; animation: pulse 1s infinite; font-weight: 900; }
        @media (min-width: 768px) { .popup-content h1 { font-size: 10rem; } }
        .popup-content p { font-size: 2rem; color: var(--text-dim); font-weight: 800; margin-top: 1.5rem; }

        /* 수신 모니터 */
        #teacher-view { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        .monitor-box {
            width: 100%; max-width: 800px; height: auto; min-height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--sidebar-bg); border-radius: 2rem; border: 3px solid var(--primary); box-shadow: 0 0 30px var(--primary-glow);
            text-align: center; padding: 3rem 1rem;
        }
        #monitor-status { font-size: 4rem; font-weight: 900; margin: 0; color: white; }
        @media (min-width: 768px) { #monitor-status { font-size: 8rem; } }

        #toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 0.8rem 2rem; border-radius: 2rem;
            font-weight: 800; z-index: 10000; display: none; font-size: 1rem;
        }

        /* 모달 반응형 */
        #edit-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 6000; align-items: center; justify-content: center; padding: 1rem;
        }
        .modal-content {
            background: var(--sidebar-bg); padding: 2rem; border-radius: 1.5rem; width: 100%; max-width: 450px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .credit-text { color: #475569; font-size: 0.75rem; font-weight: 700; margin-bottom: 0.5rem; }
    </style>
</head>
<body oncontextmenu="return false">

    <div id="toast">알림</div>

    <!-- 로그인 오버레이 -->
    <div id="login-overlay">
        <div class="login-box">
            <h1 style="color:white; font-size:2rem; font-weight:900; margin-bottom:0.3rem;">교사 호출 시스템</h1>
            <p style="color:var(--text-dim); margin-bottom:2rem; font-size:1rem; font-weight:700;">장유고등학교</p>
            <input type="text" id="login-id" placeholder="아이디" autocomplete="off">
            <input type="password" id="login-pw" placeholder="비밀번호">
            <button id="login-submit-btn">시스템 접속</button>
            <p id="login-error" style="color: var(--danger); margin-top: 1rem; display: none; font-weight: 700;"></p>
        </div>
    </div>

    <nav id="sidebar" style="display: none;">
        <div class="sidebar-header">
            <h1>교사 호출 시스템</h1>
            <p>장유고등학교</p>
        </div>
        <div id="btn-student" class="menu-item" onclick="switchMode('student')">🏢 부서호출</div>
        <div id="btn-teacher" class="menu-item" onclick="switchMode('teacher')">🔔 수신알림</div>
        <div id="btn-edit" class="menu-item" onclick="switchMode('edit')">🛠️ 배치편집</div>
        
        <div class="logout-btn-wrap" style="margin-top: auto; width: 100%;">
            <div class="credit-text">v1.1 by 홍정보 x Gemini</div>
            <button onclick="location.reload()" style="background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); padding: 0.8rem; border-radius: 1rem; cursor: pointer; font-weight: 800; font-size: 0.9rem; width: 100%;">로그아웃</button>
        </div>
    </nav>

    <main id="main-content" style="display: none;">
        <div id="dashboard-view">
            <div class="dashboard-title">부서를 선택해 주세요</div>
            <div id="dept-dashboard"></div>
        </div>

        <div id="grid-view">
            <div id="edit-header" style="display: none; background: #1e293b; padding: 1rem; border-radius: 1rem; margin-bottom: 1rem; flex-wrap: wrap; gap: 10px; border: 2px solid var(--primary);">
                <div style="display:flex; align-items:center; gap:0.5rem; font-weight:700;">
                    <span>행:</span><input type="number" id="input-rows" value="4" style="width:50px; padding: 5px; background:#0f172a; border:1px solid #334155; color:white;">
                    <span>열:</span><input type="number" id="input-cols" value="6" style="width:50px; padding: 5px; background:#0f172a; border:1px solid #334155; color:white;">
                    <button onclick="updateGridSize()" style="background:#334155; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">적용</button>
                </div>
                <div style="flex:1; text-align:right;">
                    <button onclick="saveAllSettings()" style="background:var(--primary); color:white; border:none; padding:10px 15px; border-radius:10px; font-weight:800; cursor:pointer;">최종 저장</button>
                </div>
            </div>
            
            <div id="grid-header-row">
                <button id="back-btn" onclick="showDashboard()" style="background:rgba(99, 102, 241, 0.1); border:1px solid var(--primary); color:var(--primary); border-radius: 0.8rem; font-weight:800; cursor:pointer;">◀ 목록으로</button>
                <h2 id="view-title">부서명</h2>
            </div>

            <div id="call-instruction" style="display:none;">선생님 성함을 클릭하면 호출됩니다.</div>

            <div id="grid-outer-container">
                <div id="grid-wrapper">
                    <div id="grid-container"></div>
                    <div id="partition-layer" style="position: absolute; inset: 0; pointer-events:none;"></div>
                </div>
            </div>
        </div>

        <div id="teacher-view">
            <div class="monitor-box">
                <p style="color: var(--text-dim); font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem;">현재 수신 부서</p>
                <h1 id="monitor-status">부서명</h1>
                <div class="monitor-badge" style="color: var(--accent); font-size: 1.2rem; font-weight: 800; margin-top: 2rem; display: flex; align-items: center; gap: 0.8rem;">
                    <div class="dot" style="width: 15px; height: 15px; background: var(--accent); border-radius: 50%; animation: pulse 1s infinite;"></div>
                    실시간 호출 대기 중
                </div>
            </div>
        </div>

        <div id="call-popup">
            <div class="popup-content">
                <h1 id="popup-name">교사명</h1>
                <p id="popup-status">호출 대기 중...</p>
            </div>
        </div>
    </main>

    <div id="edit-modal">
        <div class="modal-content">
            <h2 style="margin-top:0; color:white; font-weight:900; font-size: 1.5rem;">자리 배치 설정</h2>
            <p id="modal-pos" style="color:var(--text-dim); font-size:1rem; margin-bottom:1.5rem;"></p>
            <select id="teacher-dropdown" style="width:100%; padding:1rem; margin-bottom: 1.5rem; background:#1e293b; color:white; border:2px solid #334155; border-radius:1rem; font-size:1.1rem;"></select>
            <div style="display:flex; flex-direction:column; gap:0.8rem;">
                <button onclick="applyTeacher()" style="padding:1rem; background:var(--primary); color:white; border:none; border-radius:1rem; cursor:pointer; font-weight:800; font-size:1.1rem;">이 자리에 배치</button>
                <button onclick="removeTeacher()" style="padding:0.8rem; background:rgba(239, 68, 68, 0.1); border:1px solid var(--danger); color:var(--danger); border-radius:1rem; cursor:pointer; font-weight:800;">자리 비우기</button>
                <button onclick="closeModal()" style="padding:0.8rem; background:#334155; color:white; border:none; border-radius:1rem; cursor:pointer; font-weight:700;">취소</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const SUPABASE_URL = 'https://tonuqhqyeqgjbyeihjid.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_JVBFWd4KQ13j_Y-wN-5-7A_-Gm57cZw';
            const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            let currentUser = null, currentMode = 'student', currentDept = null;
            let gridRows = 4, gridCols = 6, partitions = { v: [], h: [] };
            let localTeachers = [], activeEditCell = { r: 0, c: 0 }, realTimeChannel = null;
            let isCallingLock = false;

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            window.onload = function() {
                document.getElementById('login-submit-btn').onclick = attemptLogin;
                const loginId = document.getElementById('login-id');
                const loginPw = document.getElementById('login-pw');
                [loginId, loginPw].forEach(el => el.onkeydown = e => { if(e.key === 'Enter') attemptLogin(); });
                window.addEventListener('resize', autoScale);
            };

            // [반응형 핵심] 화면 크기에 맞춰 스케일 조정
            function autoScale() {
                const outer = document.getElementById('grid-outer-container');
                const wrapper = document.getElementById('grid-wrapper');
                if(!outer || !wrapper || wrapper.offsetHeight === 0) return;
                
                const padding = 20;
                const availableW = outer.clientWidth - padding;
                const availableH = outer.clientHeight - padding;
                
                const scale = Math.min(availableW / wrapper.offsetWidth, availableH / wrapper.offsetHeight);
                // 모바일에서 너무 작아지는 것 방지 (최소 스케일 0.3)
                const finalScale = Math.max(scale, 0.1);
                wrapper.style.transform = `scale(${finalScale})`;
            }

            function playChime() {
                const playNote = (freq, start, duration) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, start);
                    gain.gain.setValueAtTime(0.3, start); 
                    gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(start);
                    osc.stop(start + duration);
                };
                const now = audioCtx.currentTime;
                playNote(783.99, now, 0.8);
                playNote(659.25, now + 0.4, 1.2);
            }

            function getKSTTime() {
                const now = new Date();
                const offset = now.getTimezoneOffset() * 60000;
                const kstDate = new Date(now.getTime() - offset + (9 * 3600000));
                const pad = (n) => n.toString().padStart(2, '0');
                const ms = now.getMilliseconds().toString().padStart(3, '0').substring(0, 2);
                return `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}.${ms}`;
            }

            async function attemptLogin() {
                const id = document.getElementById('login-id').value;
                const pw = document.getElementById('login-pw').value;
                if(!id || !pw) return;

                const { data } = await _supabase.from('t_user').select('*').eq('user_id', id).eq('user_pw', pw).maybeSingle();
                if (data) { 
                    currentUser = data; 
                    initApp(); 
                } else { 
                    const err = document.getElementById('login-error');
                    err.innerText = "계정 정보가 일치하지 않습니다."; 
                    err.style.display = 'block'; 
                }
            }

            async function initApp() {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('sidebar').style.display = 'flex';
                document.getElementById('main-content').style.display = 'flex';
                await fetchDeptList();

                if (currentUser.grade == 1) { 
                    document.getElementById('btn-student').style.display = 'flex';
                    document.getElementById('btn-teacher').style.display = 'flex';
                    document.getElementById('btn-edit').style.display = 'flex';
                    switchMode('student');
                } else if (currentUser.grade == 2) { 
                    document.getElementById('btn-student').style.display = 'none';
                    document.getElementById('btn-teacher').style.display = 'flex';
                    document.getElementById('btn-edit').style.display = 'none';
                    switchMode('teacher');
                } else { 
                    document.getElementById('btn-student').style.display = 'flex';
                    document.getElementById('btn-teacher').style.display = 'none';
                    document.getElementById('btn-edit').style.display = 'none';
                    switchMode('student');
                }
            }

            async function fetchDeptList() {
                const { data } = await _supabase.from('t_dept').select('name');
                const container = document.getElementById('dept-dashboard');
                if(!data) return;
                container.innerHTML = data.map(dept => `
                    <div class="dept-card" onclick="selectDept('${dept.name}')">
                        <div style="font-size: 2.5rem; margin-bottom:1rem;">🏢</div>
                        <h3>${dept.name}</h3>
                    </div>
                `).join('');
            }

            window.selectDept = async function(deptName) {
                currentDept = deptName;
                document.getElementById('view-title').innerText = deptName;
                document.getElementById('dashboard-view').style.display = 'none';
                
                const instruction = document.getElementById('call-instruction');
                instruction.style.display = (currentMode === 'student') ? 'block' : 'none';

                if (currentMode === 'teacher') {
                    document.getElementById('teacher-view').style.display = 'flex';
                    document.getElementById('monitor-status').innerText = deptName;
                    startListening();
                } else {
                    document.getElementById('grid-view').style.display = 'flex';
                    await loadDeptData();
                }
            };

            window.showDashboard = function() {
                stopListening();
                document.getElementById('grid-view').style.display = 'none';
                document.getElementById('teacher-view').style.display = 'none';
                document.getElementById('dashboard-view').style.display = 'flex';
                currentDept = null;
            };

            window.switchMode = function(mode) {
                currentMode = mode;
                document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
                const btnId = (mode === 'student') ? 'btn-student' : (mode === 'teacher' ? 'btn-teacher' : 'btn-edit');
                document.getElementById(btnId).classList.add('active');
                
                document.getElementById('edit-header').style.display = (mode === 'edit') ? 'flex' : 'none';
                showDashboard();
            };

            async function loadDeptData() {
                const { data: pData } = await _supabase.from('t_partition').select('*').eq('dept', currentDept).maybeSingle();
                if (pData) { 
                    gridRows = pData.rows || 4; 
                    gridCols = pData.cols || 6; 
                    partitions = pData.partitions || { v: [], h: [] }; 
                } else { 
                    gridRows = 4; gridCols = 6; partitions = { v: [], h: [] }; 
                }
                const { data: tData } = await _supabase.from('t_teacher').select('*').eq('dept', currentDept);
                localTeachers = tData || [];
                renderGrid();
            }

            function renderGrid() {
                const container = document.getElementById('grid-container');
                const wrapper = document.getElementById('grid-wrapper');
                container.innerHTML = '';
                if (currentMode === 'edit') wrapper.classList.add('edit-mode'); else wrapper.classList.remove('edit-mode');
                
                const gap = 20, cardW = 200, cardH = 160;
                container.style.gridTemplateRows = `repeat(${gridRows}, ${cardH}px)`;
                container.style.gridTemplateColumns = `repeat(${gridCols}, ${cardW}px)`;
                container.style.gap = `${gap}px`;

                for (let r = 0; r < gridRows; r++) {
                    for (let c = 0; c < gridCols; c++) {
                        const teacher = localTeachers.find(t => t.row_index === r && t.col_index === c);
                        const seat = document.createElement('div');
                        seat.className = teacher ? 'seat-card' : 'seat-card empty';
                        if(isCallingLock && currentMode === 'student') seat.classList.add('disabled');
                        
                        if (teacher) {
                            seat.innerHTML = `<h3>${teacher.name}</h3><p>${teacher.subject || ''}</p>`;
                            seat.onclick = () => (currentMode === 'edit') ? openEditModal(r, c, teacher) : initiateCall(teacher.name);
                        } else if (currentMode === 'edit') {
                            seat.onclick = () => openEditModal(r, c, null);
                        }
                        container.appendChild(seat);
                    }
                }
                renderPartitions(cardW, cardH, gap);
                setTimeout(autoScale, 50);
            }

            async function initiateCall(name) {
                if(isCallingLock) return;
                isCallingLock = true;
                renderGrid();
                const popup = document.getElementById('call-popup');
                document.getElementById('popup-name').innerText = name;
                document.getElementById('popup-status').innerText = "선생님을 호출 중입니다...";
                document.getElementById('popup-status').style.color = "var(--primary)";
                popup.style.display = 'flex';
                
                await _supabase.from('t_calls').insert([{ name, dept: currentDept, call_time: getKSTTime() }]);
                setTimeout(() => { popup.style.display = 'none'; isCallingLock = false; renderGrid(); }, 3000);
            }

            function triggerCallEffect(name) {
                if(currentMode !== 'teacher') return;
                const popup = document.getElementById('call-popup');
                document.getElementById('popup-name').innerText = name;
                document.getElementById('popup-status').innerText = "선생님, 호출입니다!";
                document.getElementById('popup-status').style.color = "var(--text-dim)";
                popup.style.display = 'flex';
                playChime();
                if ('speechSynthesis' in window) {
                    setTimeout(() => {
                        const msg = new SpeechSynthesisUtterance(`${name} 선생님.`);
                        msg.lang = 'ko-KR'; msg.rate = 0.9;
                        window.speechSynthesis.speak(msg);
                    }, 600);
                }
                setTimeout(() => { popup.style.display = 'none'; }, 6000);
            }

            function renderPartitions(cardW, cardH, gap) {
                const layer = document.getElementById('partition-layer');
                const wrapper = document.getElementById('grid-wrapper');
                layer.innerHTML = '';
                document.querySelectorAll('.partition-trigger').forEach(el => el.remove());
                const thickness = 6, extraLength = 4;

                for (let r = 0; r <= gridRows; r++) {
                    for (let c = 0; c < gridCols; c++) {
                        const id = `r${r}c${c}`;
                        if (currentMode === 'edit') {
                            const trg = document.createElement('div');
                            trg.className = 'partition-trigger';
                            trg.style.left = `${c * (cardW + gap)}px`;
                            trg.style.top = `${r * (cardH + gap) - (gap/2) - 15}px`;
                            trg.style.width = `${cardW}px`; trg.style.height = `30px`;
                            trg.onclick = () => togglePartition('h', id);
                            wrapper.appendChild(trg);
                        }
                        if ((partitions.h || []).includes(id)) {
                            const line = document.createElement('div');
                            line.className = 'partition';
                            line.style.left = `${c * (cardW + gap) - (gap/2) - (extraLength/2)}px`;
                            line.style.top = `${r * (cardH + gap) - (gap/2) - (thickness/2)}px`;
                            line.style.width = `${cardW + gap + extraLength}px`; line.style.height = `${thickness}px`;
                            layer.appendChild(line);
                        }
                    }
                }
                for (let r = 0; r < gridRows; r++) {
                    for (let c = 0; c <= gridCols; c++) {
                        const id = `r${r}c${c}`;
                        if (currentMode === 'edit') {
                            const trg = document.createElement('div');
                            trg.className = 'partition-trigger';
                            trg.style.left = `${c * (cardW + gap) - (gap/2) - 15}px`;
                            trg.style.top = `${r * (cardH + gap)}px`;
                            trg.style.width = `30px`; trg.style.height = `${cardH}px`;
                            trg.onclick = () => togglePartition('v', id);
                            wrapper.appendChild(trg);
                        }
                        if ((partitions.v || []).includes(id)) {
                            const line = document.createElement('div');
                            line.className = 'partition';
                            line.style.left = `${c * (cardW + gap) - (gap/2) - (thickness/2)}px`;
                            line.style.top = `${r * (cardH + gap) - (gap/2) - (extraLength/2)}px`;
                            line.style.width = `${thickness}px`; line.style.height = `${cardH + gap + extraLength}px`;
                            layer.appendChild(line);
                        }
                    }
                }
            }

            function togglePartition(type, id) {
                if (!partitions[type]) partitions[type] = [];
                if (partitions[type].includes(id)) partitions[type] = partitions[type].filter(x => x !== id);
                else partitions[type].push(id);
                renderGrid();
            }

            function openEditModal(r, c, teacher) {
                activeEditCell = { r, c };
                document.getElementById('modal-pos').innerText = `${r + 1}행 ${c + 1}열 설정`;
                const dropdown = document.getElementById('teacher-dropdown');
                dropdown.innerHTML = '<option value="">좌석 비우기</option>';
                localTeachers.sort((a,b) => a.name.localeCompare(b.name)).forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t.id; opt.innerText = `${t.name} (${t.subject || ''})`;
                    if (teacher && t.id === teacher.id) opt.selected = true;
                    dropdown.appendChild(opt);
                });
                document.getElementById('edit-modal').style.display = 'flex';
            }

            window.closeModal = () => document.getElementById('edit-modal').style.display = 'none';
            window.applyTeacher = function() {
                const selectedId = document.getElementById('teacher-dropdown').value;
                localTeachers.forEach(t => { if(t.row_index === activeEditCell.r && t.col_index === activeEditCell.c) { t.row_index = null; t.col_index = null; } });
                if (selectedId) { const target = localTeachers.find(t => t.id == selectedId); target.row_index = activeEditCell.r; target.col_index = activeEditCell.c; }
                renderGrid(); closeModal();
            };
            window.removeTeacher = function() { localTeachers.forEach(t => { if(t.row_index === activeEditCell.r && t.col_index === activeEditCell.c) { t.row_index = null; t.col_index = null; } }); renderGrid(); closeModal(); };

            window.updateGridSize = function() {
                gridRows = parseInt(document.getElementById('input-rows').value) || 4;
                gridCols = parseInt(document.getElementById('input-cols').value) || 6;
                renderGrid();
            };

            window.saveAllSettings = async function() {
                showToast("저장 중...");
                await _supabase.from('t_partition').upsert({ dept: currentDept, rows: gridRows, cols: gridCols, partitions: partitions });
                for (const t of localTeachers) await _supabase.from('t_teacher').update({ row_index: t.row_index, col_index: t.col_index }).eq('id', t.id);
                showToast("저장되었습니다.");
            };

            function startListening() {
                stopListening();
                realTimeChannel = _supabase.channel('public:t_calls')
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 't_calls' }, payload => {
                        if (payload.new.dept === currentDept) triggerCallEffect(payload.new.name);
                    }).subscribe();
            }
            function stopListening() { if(realTimeChannel) { _supabase.removeChannel(realTimeChannel); realTimeChannel = null; } }

            function showToast(msg) {
                const t = document.getElementById('toast');
                t.innerText = msg; t.style.display = 'block';
                setTimeout(() => t.style.display = 'none', 2000);
            }
        })();
    </script>
</body>
</html>
