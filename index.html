<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>교사 호출기</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Pretendard', sans-serif; margin: 0; display: flex; height: 100vh; background-color: #f4f6f8; }
    /* 좌측 사이드바 */
    #sidebar { width: 250px; background-color: #2c3e50; color: white; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
    #sidebar select, #sidebar button { padding: 10px; font-size: 16px; border-radius: 5px; border: none; cursor: pointer; }
    
    /* 우측 메인 화면 */
    #main { flex: 1; padding: 20px; display: flex; flex-direction: column; }
    #desk-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
    
    /* 선생님 자리 버튼 */
    .teacher-btn { background-color: white; border: 2px solid #3498db; border-radius: 10px; padding: 20px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .teacher-btn:hover { background-color: #3498db; color: white; }
    .teacher-btn:active { transform: scale(0.95); }

    /* 교사용 대기 화면 */
    #teacher-view { display: none; flex: 1; justify-content: center; align-items: center; font-size: 32px; font-weight: bold; color: #2c3e50; }
  </style>
</head>
<body>

  <div id="sidebar">
    <h2>메뉴</h2>
    <label>모드 선택</label>
    <select id="mode-select" onchange="toggleMode()">
      <option value="student">학생용 (호출하기)</option>
      <option value="teacher">교사용 (호출받기)</option>
    </select>

    <div id="dept-container">
      <label>부서 선택</label>
      <select id="dept-select" onchange="loadTeachers()">
        <option value="전체">전체</option>
        <option value="교무부">교무부</option>
        <option value="1학년부">1학년부</option>
        <option value="2학년부">2학년부</option>
      </select>
    </div>
  </div>

  <div id="main">
    <div id="student-view">
      <h2>선생님 자리 배치도</h2>
      <div id="desk-layout">
        </div>
    </div>

    <div id="teacher-view">
      🔊 수신 대기 중입니다...
    </div>
  </div>

  <script>
    // 1. Supabase 초기화 (선생님의 프로젝트 정보로 변경 필요)
    const SUPABASE_URL = 'https://[선생님의_프로젝트_URL].supabase.co';
    const SUPABASE_KEY = '[선생님의_anon_key]';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let realtimeSubscription = null;

    // 2. 선생님 목록 불러오기 (학생용 화면)
    async function loadTeachers() {
      const dept = document.getElementById('dept-select').value;
      let query = supabase.from('t_teacher').select('*');
      
      if (dept !== '전체') {
        query = query.eq('dept', dept);
      }

      const { data, error } = await query;
      if (error) {
        console.error('불러오기 오류:', error);
        return;
      }

      const layout = document.getElementById('desk-layout');
      layout.innerHTML = ''; // 초기화

      data.forEach(teacher => {
        const btn = document.createElement('button');
        btn.className = 'teacher-btn';
        btn.innerHTML = `${teacher.name} 선생님<br><span style="font-size:14px; font-weight:normal;">(${teacher.subject})</span>`;
        btn.onclick = () => callTeacher(teacher.id, teacher.name);
        layout.appendChild(btn);
      });
    }

    // 3. 선생님 호출하기 (DB INSERT)
    async function callTeacher(id, name) {
      if(!confirm(`${name} 선생님을 호출하시겠습니까?`)) return;

      const { error } = await supabase
        .from('t_calls')
        .insert([{ id: id }]);

      if (error) {
        alert('호출에 실패했습니다.');
        console.error(error);
      } else {
        alert(`${name} 선생님을 호출했습니다!`);
      }
    }

    // 4. 모드 전환 로직
    function toggleMode() {
      const mode = document.getElementById('mode-select').value;
      const studentView = document.getElementById('student-view');
      const deptContainer = document.getElementById('dept-container');
      const teacherView = document.getElementById('teacher-view');

      if (mode === 'student') {
        // 학생 모드 UI
        studentView.style.display = 'block';
        deptContainer.style.display = 'block';
        teacherView.style.display = 'none';
        
        // 교사 모드 구독 해제
        if(realtimeSubscription) supabase.removeChannel(realtimeSubscription);
        loadTeachers();

      } else {
        // 교사 모드 UI
        studentView.style.display = 'none';
        deptContainer.style.display = 'none';
        teacherView.style.display = 'flex';
        
        // 브라우저 정책상 오디오 재생 권한 획득을 위해 빈 소리 한 번 재생
        const dummyUtterance = new SpeechSynthesisUtterance('');
        window.speechSynthesis.speak(dummyUtterance);

        // Supabase 실시간 구독 시작
        startListening();
      }
    }

    // 5. 실시간 감지 및 TTS 출력 (교사용 화면)
    function startListening() {
      realtimeSubscription = supabase
        .channel('public:t_calls')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 't_calls' }, payload => {
          console.log('새로운 호출 감지:', payload.new);
          playTTS(payload.new.id);
        })
        .subscribe();
    }

    // 6. 교사 ID로 이름을 찾아 TTS 실행
    async function playTTS(teacherId) {
      const { data, error } = await supabase
        .from('t_teacher')
        .select('name')
        .eq('id', teacherId)
        .single();

      if (data && data.name) {
        const text = `${data.name} 선생님 호출`;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ko-KR'; // 한국어 설정
        utterance.rate = 0.9;     // 말하기 속도 (1이 기본)
        window.speechSynthesis.speak(utterance);
        
        // 화면에 임시로 텍스트 띄워주기
        const view = document.getElementById('teacher-view');
        view.innerHTML = `🔊 ${text}!`;
        setTimeout(() => view.innerHTML = '🔊 수신 대기 중입니다...', 5000);
      }
    }

    // 초기 실행
    loadTeachers();
  </script>
</body>
</html>
