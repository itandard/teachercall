<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>선생님 호출 시스템 - 장유고등학교</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #020617;
            --sidebar-bg: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --card-bg: #1e293b;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --accent: #10b981; 
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --partition-idle: rgba(51, 65, 85, 0.3);
            --partition-active: #64748b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; background-color: var(--bg); color: var(--text-main);
            display: flex; height: 100vh; width: 100vw; overflow: hidden;
        }

        /* 로그인 화면 */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            display: flex; justify-content: center; align-items: center; z-index: 5000;
        }
        .login-box {
            background: var(--sidebar-bg); padding: 3rem; border-radius: 2.5rem;
            border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 420px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .login-box input {
            width: 100%; padding: 1.2rem; margin-bottom: 1rem;
            background: #1e293b; border: 1px solid #334155; border-radius: 1rem; color: white;
            font-size: 1rem;
        }
        .login-box button {
            width: 100%; padding: 1.2rem; background: var(--primary); color: white;
            border: none; border-radius: 1rem; font-weight: 700; cursor: pointer;
            font-size: 1.1rem;
        }

        /* 사이드바 */
        nav {
            width: 260px; background: var(--sidebar-bg); padding: 1.5rem 1rem;
            display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05);
        }
        .menu-item {
            padding: 1.2rem 1rem; border-radius: 1rem; cursor: pointer; margin-bottom: 0.5rem;
            transition: 0.2s; display: none;
        }
        .menu-item.active { background: rgba(99, 102, 241, 0.15); border: 1px solid var(--primary); color: var(--primary); }

        /* 메인 영역 */
        main { flex: 1; padding: 1rem 1.5rem; display: flex; flex-direction: column; overflow: hidden; }

        #dept-dashboard {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.2rem; margin-top: 2rem;
        }
        .dept-card {
            background: var(--card-bg); padding: 3rem 1.2rem; border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.05); cursor: pointer; text-align: center;
            transition: 0.3s;
        }
        .dept-card:hover { transform: translateY(-5px); border-color: var(--primary); }

        /* 배치도 UI */
        #grid-view { height: 100%; display: flex; flex-direction: column; }
        #grid-outer-container {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: var(--card-bg); border-radius: 2rem; overflow: hidden; position: relative;
            margin-top: 1rem; border: 1px solid rgba(255,255,255,0.05);
        }
        #grid-wrapper { position: relative; padding: 40px; transform-origin: center center; }
        #grid-container { display: grid; position: relative; z-index: 10; }

        .seat-card {
            background: #0f172a; border-radius: 1rem; padding: 1rem; text-align: center;
            border: 1px solid #334155; display: flex; flex-direction: column; justify-content: center;
            width: 150px; height: 120px; transition: 0.2s; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .seat-card h3 { margin: 0; font-size: 1.25rem; color: #fff; font-weight: 800; }
        .seat-card p { margin: 0.3rem 0 0; font-size: 0.85rem; color: var(--text-dim); }
        .seat-card.empty { opacity: 0.2; cursor: default; border: 1px dashed #334155; }

        .partition { position: absolute; background: var(--partition-idle); z-index: 5; pointer-events: none; }
        .partition.active { background: var(--partition-active); }

        /* 알림 효과 */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 12px 30px; border-radius: 30px;
            font-weight: bold; z-index: 10000; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s forwards;
        }

        #call-popup {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #020617; padding: 4rem; border-radius: 4rem;
            box-shadow: 0 0 0 100vmax rgba(0,0,0,0.85), 0 0 80px var(--primary-glow);
            z-index: 9999; text-align: center; border: 6px solid var(--primary); width: 90%; max-width: 600px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
    </style>
</head>
<body>

    <div id="toast">알림</div>

    <!-- 로그인 -->
    <div id="login-overlay">
        <div class="login-box">
            <h1 style="color:white; font-size:2.2rem; font-weight:900; margin-bottom:0.5rem;">호출 시스템</h1>
            <p style="color:var(--text-dim); margin-bottom:2.5rem;">장유고등학교</p>
            <input type="text" id="login-id" placeholder="사용자 아이디">
            <input type="password" id="login-pw" placeholder="비밀번호">
            <button onclick="attemptLogin()">로그인</button>
            <p id="login-error" style="color: #ef4444; margin-top: 1rem; display: none;"></p>
        </div>
    </div>

    <!-- 사이드바 -->
    <nav id="sidebar" style="display: none;">
        <div style="margin-bottom: 2.5rem; padding: 0.5rem;">
            <p style="font-size: 0.75rem; color: var(--text-dim); margin: 0; font-weight:600;">JANGYU HIGH SCHOOL</p>
            <h2 id="sidebar-dept-name" style="font-size: 1.6rem; font-weight: 900; color: #fff; margin: 0;">부서 로딩중</h2>
        </div>

        <div id="btn-student" class="menu-item" onclick="switchMode('student')"><b>🏢 호출 모드</b></div>
        <div id="btn-teacher" class="menu-item" onclick="switchMode('teacher')"><b>🔔 수신 모드</b></div>
        <div id="btn-edit" class="menu-item" onclick="switchMode('edit')"><b>🛠️ 배치도 설정</b></div>

        <button onclick="location.reload()" style="margin-top: auto; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-dim); padding: 1rem; border-radius: 1rem; cursor: pointer; font-weight:bold;">
            🚪 로그아웃
        </button>
    </nav>

    <main id="main-content" style="display: none;">
        <!-- 부서 선택 -->
        <div id="dashboard-view">
            <h1 style="font-size: 2.5rem; font-weight:900; margin: 0;">부서 선택</h1>
            <div id="dept-dashboard"></div>
        </div>

        <!-- 그리드 배치도 -->
        <div id="grid-view" style="display: none;">
            <div id="edit-header" style="display: none; background: var(--primary); color: white; padding: 1rem; border-radius: 1rem; margin-bottom: 1rem; justify-content: space-between; align-items:center;">
                <span style="font-weight:bold;">🛠️ 배치도 수정 모드</span>
                <button onclick="saveAllSettings()" style="background:white; color:var(--primary); border:none; padding:8px 20px; border-radius:8px; font-weight:bold; cursor:pointer;">서버 저장</button>
            </div>
            
            <div style="display:flex; justify-content: space-between; align-items: flex-end; margin-bottom:1rem;">
                <div>
                    <button onclick="showDashboard()" style="background:none; border:none; color:var(--primary); font-weight:bold; cursor:pointer; padding:0; margin-bottom:0.5rem;">◀ 다른 부서 선택</button>
                    <h2 id="view-title" style="font-size: 2.5rem; font-weight:900; margin:0;">부서명</h2>
                </div>
            </div>

            <div id="grid-outer-container">
                <div id="grid-wrapper">
                    <div id="grid-container"></div>
                    <div id="partition-layer" style="position: absolute; inset: 0; z-index: 20; pointer-events:none;"></div>
                </div>
            </div>
        </div>

        <!-- 수신 모드 -->
        <div id="teacher-view" style="display: none; flex: 1; align-items: center; justify-content: center;">
            <div style="background: var(--sidebar-bg); padding: 5rem 3rem; border-radius: 3rem; text-align: center; border: 1px solid rgba(255,255,255,0.05); width:100%; max-width:600px;">
                <div style="color:var(--accent); font-weight:bold; margin-bottom:1rem;">● 실시간 수신 대기 중</div>
                <h1 id="monitor-status" style="font-size: 3rem; color: #fff; margin: 0; font-weight:900;">교무실</h1>
                <p style="color: var(--text-dim); margin-top: 1.5rem; font-size:1.1rem;">호출 알림이 이 화면에 표시됩니다.</p>
            </div>
        </div>

        <!-- 알림 팝업 -->
        <div id="call-popup">
            <span style="font-size: 1.5rem; color: var(--primary); font-weight: 800;">VISITOR ALERT</span>
            <h1 id="popup-name" style="font-size: 6rem; color: #fff; margin: 1.5rem 0; font-weight:900; text-shadow: 0 0 30px var(--primary-glow);">홍길동</h1>
            <span style="font-size: 2rem; color: var(--text-dim); font-weight:700;">선생님, 호출입니다!</span>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://tonuqhqyeqgjbyeihjid.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JVBFWd4KQ13j_Y-wN-5-7A_-Gm57cZw';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null, currentMode = 'student', currentDept = null;
        let rows = 4, cols = 6, partitions = { v: [], h: [] }, localLayout = [];

        async function attemptLogin() {
            const id = document.getElementById('login-id').value;
            const pw = document.getElementById('login-pw').value;
            const { data } = await _supabase.from('t_user').select('*').eq('user_id', id).eq('user_pw', pw).maybeSingle();
            if (data) { currentUser = data; initApp(); } 
            else { document.getElementById('login-error').innerText = "로그인 정보가 틀립니다."; document.getElementById('login-error').style.display = 'block'; }
        }

        function initApp() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('main-content').style.display = 'flex';
            document.getElementById('sidebar-dept-name').innerText = currentUser.dept || '교무부';

            if (currentUser.grade == 1) {
                document.getElementById('btn-student').style.display = 'block';
                document.getElementById('btn-teacher').style.display = 'block';
                document.getElementById('btn-edit').style.display = 'block';
                switchMode('student');
            } else if (currentUser.grade == 2) {
                document.getElementById('btn-teacher').style.display = 'block';
                switchMode('teacher');
            } else {
                document.getElementById('btn-student').style.display = 'block';
                switchMode('student');
            }
            
            fetchDeptList();
            showDashboard();
            window.addEventListener('resize', autoScale);
        }

        async function fetchDeptList() {
            const { data } = await _supabase.from('t_partition').select('dept');
            const uniqueDepts = data ? [...new Set(data.map(d => d.dept))] : ["교무실"];
            document.getElementById('dept-dashboard').innerHTML = uniqueDepts.map(dept => `
                <div class="dept-card" onclick="selectDept('${dept}')">
                    <div style="font-size: 3rem; margin-bottom:1rem;">🏢</div>
                    <h3 style="margin:0; font-size:1.4rem; font-weight:800; color:#fff;">${dept}</h3>
                </div>
            `).join('');
        }

        function showDashboard() {
            currentDept = null;
            document.getElementById('dashboard-view').style.display = 'block';
            document.getElementById('grid-view').style.display = 'none';
            document.getElementById('teacher-view').style.display = 'none';
            stopListening();
        }

        async function selectDept(dept) {
            currentDept = dept;
            document.getElementById('dashboard-view').style.display = 'none';
            if (currentMode === 'teacher') {
                document.getElementById('teacher-view').style.display = 'flex';
                document.getElementById('monitor-status').innerText = `${dept}`;
                startListening();
            } else {
                document.getElementById('grid-view').style.display = 'block';
                await loadLayout();
            }
        }

        async function loadLayout() {
            const { data: pData } = await _supabase.from('t_partition').select('*').eq('dept', currentDept).maybeSingle();
            if (pData) { rows = pData.rows; cols = pData.cols; partitions = pData.partitions || {v:[], h:[]}; }
            const { data: tData } = await _supabase.from('t_teacher').select('*').eq('dept', currentDept);
            localLayout = tData || [];
            renderGrid();
        }

        function renderGrid() {
            document.getElementById('view-title').innerText = currentDept;
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            
            const gap = 15, cardW = 150, cardH = 120;
            container.style.gridTemplateRows = `repeat(${rows}, ${cardH}px)`;
            container.style.gridTemplateColumns = `repeat(${cols}, ${cardW}px)`;
            container.style.gap = `${gap}px`;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const t = localLayout.find(x => x.row_index === r && x.col_index === c);
                    const card = document.createElement('div');
                    card.className = t ? 'seat-card' : 'seat-card empty';
                    if (t) {
                        card.innerHTML = `<h3>${t.name}</h3><p>${t.subject || '담당'}</p>`;
                        // 호출 함수 연결
                        card.onclick = () => sendCall(t.id, t.name, currentDept);
                    } else {
                        card.innerHTML = `<small style="color:#475569;">${r}-${c}</small>`;
                    }
                    container.appendChild(card);
                }
            }
            renderPartitions(cardW, cardH, gap);
            setTimeout(autoScale, 50);
        }

        function renderPartitions(cardW, cardH, gap) {
            const layer = document.getElementById('partition-layer');
            layer.innerHTML = '';
            const thickness = 6, offset = 40;
            (partitions.h || []).forEach(id => {
                const [r, c] = id.replace('r','').split('c').map(Number);
                const p = document.createElement('div');
                p.className = 'partition active';
                p.style.left = `${offset + c * (cardW + gap)}px`;
                p.style.top = `${offset + r * (cardH + gap) - (gap/2) - (thickness/2)}px`;
                p.style.width = `${cardW}px`; p.style.height = `${thickness}px`;
                layer.appendChild(p);
            });
            (partitions.v || []).forEach(id => {
                const [r, c] = id.replace('r','').split('c').map(Number);
                const p = document.createElement('div');
                p.className = 'partition active';
                p.style.left = `${offset + c * (cardW + gap) - (gap/2) - (thickness/2)}px`;
                p.style.top = `${offset + r * (cardH + gap)}px`;
                p.style.width = `${thickness}px`; p.style.height = `${cardH}px`;
                layer.appendChild(p);
            });
        }

        async function sendCall(teacherId, teacherName, deptName) {
            try {
                showToast(`${teacherName} 선생님 호출 중...`);
                // t_calls 테이블의 새 스키마에 맞춰 Insert
                const { error } = await _supabase.from('t_calls').insert([{
                    id: teacherId,     // 선생님 ID
                    name: teacherName, // 선생님 성함
                    dept: deptName,    // 부서명
                    call_time: new Date().toISOString()
                }]);

                if (error) throw error;

                showToast(`✅ ${teacherName} 선생님 호출 완료!`);
                speak(`${teacherName} 선생님을 호출하였습니다.`);
            } catch (err) {
                console.error("호출 에러:", err);
                showToast("❌ 호출 실패! 네트워크를 확인하세요.");
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => { if(t.innerText === msg) t.style.display = 'none'; }, 3000);
        }

        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ko-KR'; window.speechSynthesis.speak(u);
        }

        let realtimeChannel = null;
        function startListening() {
            stopListening();
            realtimeChannel = _supabase.channel('calls').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 't_calls' }, payload => {
                // 부서명이 일치하면 팝업 표시 (이름을 직접 사용)
                if (payload.new.dept === currentDept) {
                    showCallPopup(payload.new.name);
                }
            }).subscribe();
        }

        function stopListening() { if (realtimeChannel) _supabase.removeChannel(realtimeChannel); }

        function showCallPopup(name) {
            document.getElementById('popup-name').innerText = name;
            document.getElementById('call-popup').style.display = 'block';
            speak(`${name} 선생님, 호출이 왔습니다.`);
            setTimeout(() => document.getElementById('call-popup').style.display = 'none', 8000);
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            const btn = document.getElementById(`btn-${mode}`);
            if(btn) btn.classList.add('active');
            showDashboard();
        }

        function autoScale() {
            const outer = document.getElementById('grid-outer-container');
            const wrapper = document.getElementById('grid-wrapper');
            if (!outer || !wrapper || document.getElementById('grid-view').style.display === 'none') return;
            const scale = Math.min((outer.clientWidth - 40) / wrapper.offsetWidth, (outer.clientHeight - 40) / wrapper.offsetHeight);
            wrapper.style.transform = `scale(${scale})`;
        }
    </script>
</body>
</html>
