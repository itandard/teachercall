<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMART CALL - Department Isolation</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #020617;
            --sidebar-bg: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --card-bg: #1e293b;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --accent: #10b981; 
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --partition-idle: rgba(51, 65, 85, 0.5);
            --partition-active: #475569;
            --partition-thickness: 8px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; background-color: var(--bg); color: var(--text-main);
            display: flex; height: 100vh; width: 100vw; overflow: hidden;
        }

        /* Login Overlay */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            display: flex; justify-content: center; align-items: center; z-index: 5000;
        }
        .login-box {
            background: var(--sidebar-bg); padding: 3rem; border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 420px; text-align: center;
        }
        .login-box input {
            width: 100%; padding: 1.2rem; margin-bottom: 1rem;
            background: #1e293b; border: 1px solid #334155; border-radius: 1rem; color: white;
        }
        .login-box button {
            width: 100%; padding: 1.2rem; background: var(--primary); color: white;
            border: none; border-radius: 1rem; font-weight: 700; cursor: pointer;
        }

        /* Sidebar */
        nav {
            width: 280px; background: var(--sidebar-bg); padding: 2.5rem 1.5rem;
            display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05);
        }
        .menu-item {
            padding: 1rem; border-radius: 1rem; cursor: pointer; margin-bottom: 0.75rem;
            background: transparent; border: 1px solid transparent; transition: 0.3s;
        }
        .menu-item.active { background: rgba(99, 102, 241, 0.15); border-color: var(--primary); color: var(--primary); }

        /* Main Content */
        main { flex: 1; padding: 2.5rem; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        /* Dept Cards */
        #dept-dashboard {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem; margin-top: 2rem;
        }
        .dept-card {
            background: var(--card-bg); padding: 3rem 2rem; border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.05); cursor: pointer; text-align: center;
        }
        .dept-card:hover { transform: translateY(-10px); border-color: var(--primary); }

        /* Grid UI */
        #grid-outer-container {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: #0f172a; border-radius: 2rem; overflow: hidden; position: relative;
        }
        #grid-wrapper { position: relative; padding: 60px; background: #1e293b; border-radius: 1.5rem; }
        #grid-container { display: grid; position: relative; z-index: 10; }

        /* Seat Cards */
        .seat-card {
            background: #0f172a; border-radius: 1rem; padding: 1rem; text-align: center;
            border: 2px solid #334155; display: flex; flex-direction: column; justify-content: center;
            width: 150px; height: 130px; position: relative;
        }
        .seat-card:not(.empty) { cursor: pointer; }
        .seat-card:not(.empty):active { transform: scale(0.95); }
        .seat-card.empty { border: 2px dashed #334155; background: transparent; opacity: 0.4; }

        /* Partition */
        .partition { position: absolute; background: var(--partition-idle); border-radius: 10px; z-index: 15; }
        .partition.active { background: var(--partition-active); }

        /* Call Alert Popup */
        #call-popup {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #020617; padding: 4rem; border-radius: 4rem;
            box-shadow: 0 0 0 100vmax rgba(0,0,0,0.8), 0 0 100px var(--primary-glow);
            z-index: 9999; text-align: center; border: 4px solid var(--primary); width: 90%; max-width: 700px;
        }

        .header-title { font-size: 2.8rem; font-weight: 900; margin: 0; color: #fff; }
        .header-desc { color: var(--text-dim); font-size: 1.1rem; margin-top: 0.5rem; }
        .back-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-dim); padding: 0.8rem 1.2rem; border-radius: 1rem; cursor: pointer; margin-bottom: 1.5rem; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h1 style="color: #fff; font-size: 2.2rem; font-weight: 900;">SMART CALL</h1>
            <p style="color: var(--text-dim); margin-bottom: 2rem;">Professional School Management</p>
            <input type="text" id="login-id" placeholder="ID">
            <input type="password" id="login-pw" placeholder="Password">
            <button onclick="attemptLogin()">시스템 접속</button>
            <p id="login-error" style="color: #ef4444; margin-top: 1rem; display: none;"></p>
        </div>
    </div>

    <nav id="sidebar" style="display: none;">
        <div style="margin-bottom: 3rem;">
            <h2 style="font-size: 1.6rem; font-weight: 900; color: #fff;">SMART CALL</h2>
            <div id="user-info-badge" style="font-size: 0.8rem; color: var(--primary); margin-top: 0.5rem;"></div>
        </div>

        <div id="btn-student" class="menu-item" onclick="switchMode('student')">
            <b>🏠 호출 센터</b><br><small>학생 및 내방객용</small>
        </div>
        <div id="btn-teacher" class="menu-item" onclick="switchMode('teacher')">
            <b>📺 수신 모니터</b><br><small>교직원 전용 실시간</small>
        </div>
        <div id="btn-edit" class="menu-item" onclick="switchMode('edit')" style="display: none;">
            <b>⚙️ 레이아웃 설정</b><br><small>관리자 전용</small>
        </div>

        <button onclick="location.reload()" style="margin-top: auto; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #ef4444; padding: 1rem; border-radius: 1rem; cursor: pointer;">로그아웃</button>
    </nav>

    <main id="main-content" style="display: none;">
        <!-- Student Dashboard -->
        <div id="dashboard-view">
            <header>
                <h1 class="header-title">부서 선택</h1>
                <p class="header-desc">방문하신 부서를 선택해 주세요.</p>
            </header>
            <div id="dept-dashboard"></div>
        </div>

        <!-- Grid View (Calling/Editing) -->
        <div id="grid-view" style="display: none;">
            <div id="edit-header" style="display: none; background: var(--primary); color: white; padding: 1rem; border-radius: 1rem; margin-bottom: 1rem; justify-content: space-between; align-items: center;">
                <div>
                    그리드: <input type="number" id="grid-rows" style="width:50px"> x <input type="number" id="grid-cols" style="width:50px">
                    <button onclick="updateGridSize()" style="background: white; color: var(--primary); border: none; padding: 5px 10px; border-radius: 5px; font-weight: bold;">변경</button>
                </div>
                <button onclick="saveAllSettings()" style="background: #020617; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer;">클라우드 저장</button>
            </div>

            <button class="back-btn" onclick="showDashboard()">← 부서 목록</button>
            <h2 id="view-title" class="header-title">부서명</h2>
            <p id="view-desc" class="header-desc">화면의 좌석을 터치하여 호출하세요.</p>

            <div id="grid-outer-container" style="margin-top: 2rem;">
                <div id="grid-wrapper">
                    <div id="grid-container"></div>
                    <div id="partition-layer" style="position: absolute; inset: 0; pointer-events: none; z-index: 20;"></div>
                </div>
            </div>
        </div>

        <!-- Teacher Standby Mode -->
        <div id="teacher-view" style="display: none; flex: 1; align-items: center; justify-content: center;">
            <div style="background: var(--sidebar-bg); padding: 5rem; border-radius: 3rem; text-align: center; border: 1px solid rgba(255,255,255,0.1);">
                <div id="monitor-dept-tag" style="color: var(--accent); font-weight: bold; margin-bottom: 1rem;">● 부서명 모니터링 중</div>
                <h1 style="font-size: 4rem; color: #fff;">수신 대기</h1>
                <p style="color: var(--text-dim); font-size: 1.2rem;">동일 부서의 호출만 수신합니다.</p>
            </div>
        </div>

        <!-- Call Alert Popup -->
        <div id="call-popup">
            <span style="font-size: 1.5rem; color: var(--primary); font-weight: 800; display: block; margin-bottom: 1rem;">부서 내 호출 발생</span>
            <span id="popup-name" style="font-size: 6rem; font-weight: 900; color: #fff;">홍길동</span>
            <span style="font-size: 2rem; color: var(--text-dim); display: block; margin-top: 1rem;">선생님을 찾고 있습니다.</span>
        </div>
    </main>

    <!-- Modal for Edit -->
    <div id="edit-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:10000; justify-content:center; align-items:center;">
        <div style="background:var(--sidebar-bg); padding:2.5rem; border-radius:2rem; width:400px; text-align:center;">
            <h3>좌석 배정</h3>
            <select id="teacher-picker" style="width:100%; padding:1rem; border-radius:0.5rem; margin-bottom:2rem; background:#1e293b; color:white;"></select>
            <div style="display:flex; gap:1rem;">
                <button onclick="closeEditModal()" style="flex:1; padding:1rem; border-radius:0.5rem; background:#334155; color:white; border:none;">취소</button>
                <button onclick="applySeatChange()" style="flex:1; padding:1rem; border-radius:0.5rem; background:var(--primary); color:white; border:none;">확인</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://tonuqhqyeqgjbyeihjid.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JVBFWd4KQ13j_Y-wN-5-7A_-Gm57cZw';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null, currentMode = 'student', currentDept = null;
        let rows = 4, cols = 6, partitions = { v: [], h: [] }, localLayout = [];
        let activeEditCoord = { r: 0, c: 0 }, realtimeChannel = null;

        async function attemptLogin() {
            const id = document.getElementById('login-id').value;
            const pw = document.getElementById('login-pw').value;
            if (!id || !pw) return;

            const { data } = await _supabase.from('t_user').select('*').eq('user_id', id).eq('user_pw', pw).maybeSingle();
            if (data) { 
                currentUser = data; 
                initApp(); 
            } else { 
                const err = document.getElementById('login-error');
                err.innerText = "계정 정보를 확인하세요."; err.style.display = 'block'; 
            }
        }

        async function initApp() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('main-content').style.display = 'flex';
            document.getElementById('user-info-badge').innerText = `${currentUser.dept} | 권한 ${currentUser.grade}`;

            // 관리자 권한 설정
            if (currentUser.grade == 1) document.getElementById('btn-edit').style.display = 'block';

            // 권한 2 (Teacher)는 즉시 대기 화면으로
            if (currentUser.grade == 2) {
                switchMode('teacher');
            } else {
                switchMode('student');
                await fetchDeptList();
                showDashboard();
            }
            window.addEventListener('resize', autoScale);
        }

        async function fetchDeptList() {
            const { data } = await _supabase.from('t_partition').select('dept');
            const uniqueDepts = data ? [...new Set(data.map(d => d.dept))] : ["본교무실"];
            const container = document.getElementById('dept-dashboard');
            container.innerHTML = uniqueDepts.map(dept => `
                <div class="dept-card" onclick="selectDept('${dept}')">
                    <div style="font-size: 3rem;">🏢</div>
                    <h3 style="margin: 1rem 0;">${dept}</h3>
                    <p style="color: var(--text-dim); font-size: 0.8rem;">부서 입장</p>
                </div>
            `).join('');
        }

        function showDashboard() {
            currentDept = null;
            document.getElementById('dashboard-view').style.display = 'block';
            document.getElementById('grid-view').style.display = 'none';
        }

        async function selectDept(dept) {
            currentDept = dept;
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('grid-view').style.display = 'block';
            await loadDeptLayout();
        }

        async function loadDeptLayout() {
            const { data: pData } = await _supabase.from('t_partition').select('*').eq('dept', currentDept).maybeSingle();
            if (pData) {
                rows = pData.rows || 4; cols = pData.cols || 6; partitions = pData.partitions || { v: [], h: [] };
            } else {
                rows = 4; cols = 6; partitions = { v: [], h: [] };
            }
            const { data: tData } = await _supabase.from('t_teacher').select('*');
            localLayout = tData || [];
            renderGrid();
        }

        function renderGrid() {
            document.getElementById('view-title').innerText = currentDept;
            const container = document.getElementById('grid-container');
            const pLayer = document.getElementById('partition-layer');
            container.innerHTML = ''; pLayer.innerHTML = '';

            const gap = 20, cardW = 150, cardH = 130;
            container.style.gridTemplateRows = `repeat(${rows}, ${cardH}px)`;
            container.style.gridTemplateColumns = `repeat(${cols}, ${cardW}px)`;
            container.style.gap = `${gap}px`;

            const deptTeachers = localLayout.filter(t => t.dept === currentDept);
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const t = deptTeachers.find(x => x.row_index === r && x.col_index === c);
                    const card = document.createElement('div');
                    card.className = t ? 'seat-card' : 'seat-card empty';
                    if (t) {
                        card.innerHTML = `<h3>${t.name}</h3><p>${t.subject || ''}</p>`;
                        card.onclick = () => (currentMode === 'edit' ? handleEdit(r, c, t) : sendCall(t.id, t.name, currentDept));
                    } else {
                        card.innerHTML = `<small style="color:#475569">${r},${c}</small>`;
                        if (currentMode === 'edit') card.onclick = () => handleEdit(r, c, null);
                    }
                    container.appendChild(card);
                }
            }
            
            // 파티션 렌더링
            const thickness = 8, wrapOffset = 60;
            // 가로
            for (let r = 0; r <= rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const id = `r${r}c${c}`;
                    if (partitions.h?.includes(id) || currentMode === 'edit') {
                        const p = document.createElement('div');
                        p.className = `partition ${partitions.h?.includes(id) ? 'active' : ''}`;
                        p.style.left = `${wrapOffset + c * (cardW + gap) - (thickness/2)}px`;
                        p.style.top = `${wrapOffset + r * (cardH + gap) - (gap/2) - (thickness/2)}px`;
                        p.style.width = `${cardW + gap + thickness}px`;
                        p.style.height = `${thickness}px`;
                        if (currentMode === 'edit') {
                            p.style.cursor = 'pointer'; p.style.pointerEvents = 'auto';
                            p.onclick = (e) => togglePartition('h', id, e);
                        }
                        pLayer.appendChild(p);
                    }
                }
            }
            // 세로
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c <= cols; c++) {
                    const id = `r${r}c${c}`;
                    if (partitions.v?.includes(id) || currentMode === 'edit') {
                        const p = document.createElement('div');
                        p.className = `partition ${partitions.v?.includes(id) ? 'active' : ''}`;
                        p.style.left = `${wrapOffset + c * (cardW + gap) - (gap/2) - (thickness/2)}px`;
                        p.style.top = `${wrapOffset + r * (cardH + gap) - (thickness/2)}px`;
                        p.style.width = `${thickness}px`;
                        p.style.height = `${cardH + gap + thickness}px`;
                        if (currentMode === 'edit') {
                            p.style.cursor = 'pointer'; p.style.pointerEvents = 'auto';
                            p.onclick = (e) => togglePartition('v', id, e);
                        }
                        pLayer.appendChild(p);
                    }
                }
            }
            autoScale();
        }

        function togglePartition(type, id, e) {
            e.stopPropagation();
            if (!partitions[type]) partitions[type] = [];
            if (partitions[type].includes(id)) partitions[type] = partitions[type].filter(i => i !== id);
            else partitions[type].push(id);
            renderGrid();
        }

        async function sendCall(tid, name, dept) {
            // 호출 시 부서 정보(dept)를 함께 보냄
            const { error } = await _supabase.from('t_calls').insert([{ 
                id: tid, 
                dept: dept, 
                call_time: new Date().toISOString() 
            }]);
            if (!error) {
                speak(`${name} 선생님을 호출하였습니다.`);
            }
        }

        function startListening() {
            document.getElementById('monitor-dept-tag').innerText = `● ${currentUser.dept} 모니터링 활성화`;
            
            realtimeChannel = _supabase.channel('calls-room').on('postgres_changes', { 
                event: 'INSERT', schema: 'public', table: 't_calls' 
            }, async (payload) => {
                const callData = payload.new;
                
                // 로직 핵심: 호출된 부서(callData.dept)와 현재 선생님 부서(currentUser.dept) 비교
                if (callData.dept === currentUser.dept) {
                    const { data } = await _supabase.from('t_teacher').select('name').eq('id', callData.id).maybeSingle();
                    if (data) showCallPopup(data.name);
                }
            }).subscribe();
        }

        function stopListening() { if (realtimeChannel) _supabase.removeChannel(realtimeChannel); }

        function showCallPopup(name) {
            document.getElementById('popup-name').innerText = name;
            document.getElementById('call-popup').style.display = 'block';
            speak(`${name} 선생님, 호출입니다.`);
            setTimeout(() => document.getElementById('call-popup').style.display = 'none', 7000);
        }

        function speak(t) {
            const u = new SpeechSynthesisUtterance(t); u.lang = 'ko-KR';
            window.speechSynthesis.speak(u);
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');
            
            document.getElementById('edit-header').style.display = (mode === 'edit') ? 'flex' : 'none';
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('grid-view').style.display = 'none';
            document.getElementById('teacher-view').style.display = 'none';

            if (mode === 'teacher') {
                document.getElementById('teacher-view').style.display = 'flex';
                document.getElementById('btn-student').style.display = 'none'; // 선생님은 호출 페이지 안보임
                startListening();
            } else {
                stopListening();
                if (currentDept) selectDept(currentDept);
                else showDashboard();
            }
        }

        function autoScale() {
            const outer = document.getElementById('grid-outer-container');
            const wrapper = document.getElementById('grid-wrapper');
            if (!outer || !wrapper || document.getElementById('grid-view').style.display === 'none') return;
            const finalScale = Math.min((outer.clientWidth - 100) / wrapper.offsetWidth, (outer.clientHeight - 100) / wrapper.offsetHeight, 1.2);
            wrapper.style.transform = `scale(${finalScale})`;
        }

        function handleEdit(r, c, t) {
            if (t) { if (confirm(`${t.name} 선생님 배치를 해제할까요?`)) { t.row_index = null; t.col_index = null; renderGrid(); } } 
            else { activeEditCoord = { r, c }; openEditModal(); }
        }
        function openEditModal() {
            const picker = document.getElementById('teacher-picker');
            picker.innerHTML = '<option value="">선생님 선택</option>' + localLayout.filter(t => !t.row_index).map(t => `<option value="${t.id}">${t.name}</option>`).join('');
            document.getElementById('edit-modal').style.display = 'flex';
        }
        function closeEditModal() { document.getElementById('edit-modal').style.display = 'none'; }
        function applySeatChange() {
            const tid = document.getElementById('teacher-picker').value;
            const t = localLayout.find(x => x.id == tid);
            if (t) { t.dept = currentDept; t.row_index = activeEditCoord.r; t.col_index = activeEditCoord.c; }
            closeEditModal(); renderGrid();
        }
        async function saveAllSettings() {
            for (const t of localLayout) await _supabase.from('t_teacher').update({ dept: t.dept, row_index: t.row_index, col_index: t.col_index }).eq('id', t.id);
            await _supabase.from('t_partition').upsert({ dept: currentDept, rows, cols, partitions });
            alert("저장되었습니다.");
        }
        function updateGridSize() {
            rows = parseInt(document.getElementById('grid-rows').value);
            cols = parseInt(document.getElementById('grid-cols').value);
            renderGrid();
        }
    </script>
</body>
</html>
