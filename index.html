<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교사 호출 시스템 - 장유고등학교</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #020617;
            --sidebar-bg: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --card-bg: #1e293b;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --accent: #10b981; 
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --partition-active: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; background-color: var(--bg); color: var(--text-main);
            display: flex; height: 100vh; width: 100vw; overflow: hidden;
        }

        /* Login UI */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            display: flex; justify-content: center; align-items: center; z-index: 5000;
        }
        .login-box {
            background: var(--sidebar-bg); padding: 3rem; border-radius: 2.5rem;
            border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 420px; text-align: center;
        }
        .login-box input {
            width: 100%; padding: 1.2rem; margin-bottom: 1rem;
            background: #1e293b; border: 1px solid #334155; border-radius: 1rem; color: white;
            font-size: 1rem;
        }
        .login-box button {
            width: 100%; padding: 1.2rem; background: var(--primary); color: white;
            border: none; border-radius: 1rem; font-weight: 700; cursor: pointer; font-size: 1.1rem;
        }

        /* Sidebar UI */
        nav {
            width: 280px; background: var(--sidebar-bg); padding: 2rem 1.2rem;
            display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05);
        }
        .sidebar-header { margin-bottom: 3rem; }
        .sidebar-header h1 { font-size: 1.6rem; font-weight: 900; color: #fff; margin: 0; }
        .sidebar-header p { font-size: 0.95rem; color: var(--text-dim); margin: 5px 0 0 0; font-weight: 500; }

        .menu-item {
            padding: 1.2rem 1rem; border-radius: 1rem; cursor: pointer; margin-bottom: 0.5rem;
            transition: 0.2s; display: none; color: var(--text-dim); font-weight: 600;
        }
        .menu-item.active { background: rgba(99, 102, 241, 0.15); border: 1px solid var(--primary); color: var(--primary); }

        /* Main Content UI */
        main { flex: 1; padding: 2rem; display: flex; flex-direction: column; overflow: hidden; }

        #dept-dashboard {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem; margin-top: 2rem;
        }
        .dept-card {
            background: var(--card-bg); padding: 3.5rem 1.5rem; border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.05); cursor: pointer; text-align: center;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dept-card:hover { transform: translateY(-8px); border-color: var(--primary); }

        /* Grid Layout UI */
        #grid-view { height: 100%; display: flex; flex-direction: column; }
        #grid-outer-container {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: var(--card-bg); border-radius: 2.5rem; overflow: hidden; position: relative;
            margin-top: 1.5rem; border: 1px solid rgba(255,255,255,0.05);
        }
        #grid-wrapper { position: relative; padding: 150px; transform-origin: center center; }
        #grid-container { display: grid; position: relative; z-index: 10; }

        .seat-card {
            background: #0f172a; border-radius: 1rem; padding: 1.2rem; text-align: center;
            border: 1px solid #334155; display: flex; flex-direction: column; justify-content: center;
            width: 160px; height: 130px; transition: 0.2s; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; z-index: 10;
        }
        .seat-card h3 { margin: 0; font-size: 1.4rem; color: #fff; font-weight: 800; }
        .seat-card p { margin: 0.4rem 0 0; font-size: 0.9rem; color: var(--text-dim); }
        
        .seat-card.empty { background: transparent; border: 1px solid rgba(255,255,255,0.03); cursor: default; }
        .edit-mode .seat-card.empty { background: rgba(255,255,255,0.02); border: 1px dashed #334155; cursor: pointer; }

        /* Partition Controls - 시각적 정확도 개선 */
        .partition-trigger {
            position: absolute; background: transparent; cursor: pointer; z-index: 30;
            display: none; transition: 0.2s;
        }
        .edit-mode .partition-trigger { display: block; }
        .partition-trigger:hover { background: rgba(99, 102, 241, 0.3); }

        .partition { 
            position: absolute; background: var(--partition-active); z-index: 5; pointer-events: none; 
            /* 연결 부위를 깔끔하게 하기 위해 radius 제거 */
        }

        /* Modal */
        #edit-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 6000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--sidebar-bg); padding: 2.5rem; border-radius: 2rem; width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        select, input {
            width: 100%; padding: 1rem; margin: 10px 0; border-radius: 0.8rem;
            background: #1e293b; border: 1px solid #334155; color: white;
            font-size: 1rem;
        }

        #toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 12px 30px; border-radius: 40px;
            font-weight: 800; z-index: 10000; display: none;
        }

        #call-popup {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #020617; padding: 5rem; border-radius: 5rem;
            box-shadow: 0 0 0 100vmax rgba(0,0,0,0.9), 0 0 100px var(--primary-glow);
            z-index: 9999; text-align: center; border: 8px solid var(--primary); width: 90%; max-width: 700px;
        }
    </style>
</head>
<body>

    <div id="toast">알림</div>

    <!-- Login -->
    <div id="login-overlay">
        <div class="login-box">
            <h1 style="color:white; font-size:2rem; font-weight:900;">교사 호출 시스템</h1>
            <p style="color:var(--text-dim); margin-bottom:2rem;">장유고등학교</p>
            <input type="text" id="login-id" placeholder="아이디">
            <input type="password" id="login-pw" placeholder="비밀번호">
            <button onclick="attemptLogin()">접속하기</button>
            <p id="login-error" style="color: #ef4444; margin-top: 1rem; display: none;"></p>
        </div>
    </div>

    <!-- Sidebar -->
    <nav id="sidebar" style="display: none;">
        <div class="sidebar-header">
            <h1>교사 호출 시스템</h1>
            <p>장유고등학교</p>
        </div>
        <div id="btn-student" class="menu-item" onclick="switchMode('student')">🏢 호출 모드</div>
        <div id="btn-teacher" class="menu-item" onclick="switchMode('teacher')">🔔 수신 모드</div>
        <div id="btn-edit" class="menu-item" onclick="switchMode('edit')">🛠️ 배치도 설정</div>
        <button onclick="location.reload()" style="margin-top: auto; background: none; border: 1px solid #ef4444; color: #f87171; padding: 1rem; border-radius: 1rem; cursor: pointer; font-weight: 700;">로그아웃</button>
    </nav>

    <main id="main-content" style="display: none;">
        <div id="dashboard-view">
            <h1 style="font-size: 2.5rem; font-weight:900;">호출할 부서를 선택하세요</h1>
            <div id="dept-dashboard"></div>
        </div>

        <div id="grid-view" style="display: none;">
            <div id="edit-header" style="display: none; background: #1e293b; padding: 1.2rem; border-radius: 1.5rem; margin-bottom: 1rem; align-items: center; gap: 20px; border: 1px solid var(--primary);">
                <div style="display:flex; align-items:center; gap:10px;">
                    <label>행(Rows):</label>
                    <input type="number" id="input-rows" value="4" style="width:60px; margin:0;" onchange="updateGridSize()">
                    <label>열(Cols):</label>
                    <input type="number" id="input-cols" value="6" style="width:60px; margin:0;" onchange="updateGridSize()">
                </div>
                <div style="flex:1; text-align:right;">
                    <button onclick="saveAllSettings()" style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:10px; font-weight:800; cursor:pointer;">서버에 저장</button>
                </div>
            </div>
            
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:1rem;">
                <button onclick="showDashboard()" style="background:none; border:none; color:var(--primary); font-weight:800; cursor:pointer; font-size:1.1rem;">◀ 부서 목록</button>
                <h2 id="view-title" style="margin:0;">부서명</h2>
            </div>

            <div id="grid-outer-container">
                <div id="grid-wrapper">
                    <div id="grid-container"></div>
                    <div id="partition-layer" style="position: absolute; inset: 0; pointer-events:none;"></div>
                </div>
            </div>
        </div>

        <div id="teacher-view" style="display: none; flex: 1; align-items: center; justify-content: center;">
            <div style="text-align: center; background: var(--sidebar-bg); padding: 4rem; border-radius: 3rem;">
                <h1 id="monitor-status" style="font-size: 3rem; margin: 0;">부서명</h1>
                <p style="color: var(--accent); font-weight: 800; margin-top: 1rem;">● 실시간 수신 대기 중</p>
            </div>
        </div>

        <div id="call-popup">
            <h1 id="popup-name" style="font-size: 7rem; margin: 0;">홍길동</h1>
            <p style="font-size: 2rem; color: var(--text-dim);">선생님, 호출입니다!</p>
        </div>
    </main>

    <!-- Teacher Selection Modal -->
    <div id="edit-modal">
        <div class="modal-content">
            <h3 id="modal-title" style="margin-top:0; color:white;">선생님 배치</h3>
            <div style="margin-top: 20px;">
                <label style="color:var(--text-dim); font-size: 0.9rem;">교사 선택</label>
                <select id="select-teacher-list">
                    <option value="">불러오는 중...</option>
                </select>
            </div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="applyTeacher()" style="flex:1; padding:12px; background:var(--primary); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:700;">적용</button>
                <button onclick="removeTeacher()" id="btn-remove-teacher" style="flex:1; padding:12px; background:#ef4444; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:700;">삭제</button>
                <button onclick="closeModal()" style="flex:1; padding:12px; background:#334155; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:700;">취소</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://tonuqhqyeqgjbyeihjid.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JVBFWd4KQ13j_Y-wN-5-7A_-Gm57cZw';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null, currentMode = 'student', currentDept = null;
        let rows = 4, cols = 6, partitions = { v: [], h: [] }, localLayout = [];
        let allTeachers = []; 
        let activeEditCell = { r: 0, c: 0 };

        async function attemptLogin() {
            const id = document.getElementById('login-id').value;
            const pw = document.getElementById('login-pw').value;
            if(!id || !pw) return;

            const { data, error } = await _supabase.from('t_user').select('*').eq('user_id', id).eq('user_pw', pw).maybeSingle();
            if (data) { 
                currentUser = data; 
                initApp(); 
            } else { 
                document.getElementById('login-error').innerText = "접속 정보 오류"; 
                document.getElementById('login-error').style.display = 'block'; 
            }
        }

        async function initApp() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('main-content').style.display = 'flex';

            // 명단 로딩 완료 후 다음 단계 진행
            await fetchAllTeachers();
            await fetchDeptList();

            if (currentUser.grade == 1) {
                document.getElementById('btn-student').style.display = 'block';
                document.getElementById('btn-teacher').style.display = 'block';
                document.getElementById('btn-edit').style.display = 'block';
                switchMode('student');
            } else if (currentUser.grade == 2) {
                document.getElementById('btn-teacher').style.display = 'block';
                switchMode('teacher');
            } else {
                document.getElementById('btn-student').style.display = 'block';
                switchMode('student');
            }
            window.addEventListener('resize', autoScale);
        }

        async function fetchAllTeachers() {
            const select = document.getElementById('select-teacher-list');
            select.innerHTML = '<option value="">명단 확인 중...</option>';
            
            try {
                const { data, error } = await _supabase.from('t_teacher_list').select('*');
                if (error) throw error;

                allTeachers = data || [];
                select.innerHTML = '<option value="">-- 교사를 선택하세요 --</option>';
                
                if (allTeachers.length === 0) {
                    select.innerHTML = '<option value="">데이터 없음</option>';
                    return;
                }

                allTeachers.sort((a, b) => a.name.localeCompare(b.name));
                allTeachers.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t.name;
                    opt.text = `${t.name} (${t.subject || '담당'})`;
                    opt.dataset.subject = t.subject || '';
                    select.appendChild(opt);
                });
            } catch (err) {
                console.error("교사 명단 로딩 실패:", err);
                select.innerHTML = '<option value="">데이터 오류 (새로고침 요망)</option>';
                // 3초 후 자동 재시도 1회
                setTimeout(fetchAllTeachers, 3000);
            }
        }

        async function fetchDeptList() {
            try {
                const { data } = await _supabase.from('t_partition').select('dept');
                const uniqueDepts = data && data.length > 0 ? [...new Set(data.map(d => d.dept))] : ["교무실"];
                document.getElementById('dept-dashboard').innerHTML = uniqueDepts.map(dept => `
                    <div class="dept-card" onclick="selectDept('${dept}')">
                        <div style="font-size: 3rem; margin-bottom:1rem;">🏢</div>
                        <h3 style="margin:0; color:#fff;">${dept}</h3>
                    </div>
                `).join('');
            } catch (err) {
                console.error("부서 목록 로딩 실패:", err);
            }
        }

        function showDashboard() {
            currentDept = null;
            document.getElementById('dashboard-view').style.display = 'block';
            document.getElementById('grid-view').style.display = 'none';
            document.getElementById('teacher-view').style.display = 'none';
            stopListening();
        }

        async function selectDept(dept) {
            currentDept = dept;
            document.getElementById('dashboard-view').style.display = 'none';
            if (currentMode === 'teacher') {
                document.getElementById('teacher-view').style.display = 'flex';
                document.getElementById('monitor-status').innerText = dept;
                startListening();
            } else {
                document.getElementById('grid-view').style.display = 'block';
                await loadLayout();
            }
        }

        async function loadLayout() {
            const { data: pData } = await _supabase.from('t_partition').select('*').eq('dept', currentDept).maybeSingle();
            if (pData) { 
                rows = pData.rows; cols = pData.cols; partitions = pData.partitions || {v:[], h:[]}; 
                document.getElementById('input-rows').value = rows;
                document.getElementById('input-cols').value = cols;
            } else {
                rows = 4; cols = 6; partitions = {v:[], h:[]};
            }
            const { data: tData } = await _supabase.from('t_teacher').select('*').eq('dept', currentDept);
            localLayout = tData || [];
            renderGrid();
        }

        function updateGridSize() {
            rows = parseInt(document.getElementById('input-rows').value) || 4;
            cols = parseInt(document.getElementById('input-cols').value) || 6;
            renderGrid();
        }

        function renderGrid() {
            document.getElementById('view-title').innerText = currentDept;
            const container = document.getElementById('grid-container');
            const wrapper = document.getElementById('grid-wrapper');
            container.innerHTML = '';
            
            if (currentMode === 'edit') wrapper.classList.add('edit-mode');
            else wrapper.classList.remove('edit-mode');

            const gap = 15, cardW = 160, cardH = 130;
            container.style.gridTemplateRows = `repeat(${rows}, ${cardH}px)`;
            container.style.gridTemplateColumns = `repeat(${cols}, ${cardW}px)`;
            container.style.gap = `${gap}px`;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const t = localLayout.find(x => x.row_index === r && x.col_index === c);
                    const card = document.createElement('div');
                    card.className = t ? 'seat-card' : 'seat-card empty';
                    
                    if (t) {
                        card.innerHTML = `<h3>${t.name}</h3><p>${t.subject || ''}</p>`;
                        card.onclick = () => (currentMode === 'edit') ? openEditModal(r, c, t) : sendCall(t.id, t.name, currentDept);
                    } else if (currentMode === 'edit') {
                        card.onclick = () => openEditModal(r, c, null);
                    }
                    container.appendChild(card);
                }
            }
            renderPartitions(cardW, cardH, gap);
            setTimeout(autoScale, 50);
        }

        function renderPartitions(cardW, cardH, gap) {
            const layer = document.getElementById('partition-layer');
            const wrapper = document.getElementById('grid-wrapper');
            layer.innerHTML = '';
            const thickness = 6; // 선 두께를 약간 얇게 조정
            const offset = 150; // padding과 일치

            document.querySelectorAll('.partition-trigger').forEach(el => el.remove());

            // Horizontal Partitions (행 사이의 가로선)
            for (let r = 0; r <= rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const id = `r${r}c${c}`;
                    const isActive = (partitions.h || []).includes(id);
                    
                    // Trigger area
                    const trigger = document.createElement('div');
                    trigger.className = 'partition-trigger';
                    trigger.style.left = `${offset + c * (cardW + gap)}px`;
                    trigger.style.top = `${offset + r * (cardH + gap) - (gap/2) - 10}px`;
                    trigger.style.width = `${cardW}px`; trigger.style.height = `20px`;
                    trigger.onclick = () => togglePartition('h', id);
                    wrapper.appendChild(trigger);

                    if (isActive) {
                        const line = document.createElement('div');
                        line.className = 'partition';
                        // 선 길이를 정밀하게 계산: 카드 너비 + 갭의 절반씩 양쪽으로 (연결 부위 깔끔하게)
                        line.style.left = `${offset + c * (cardW + gap) - (gap/2)}px`;
                        line.style.top = `${offset + r * (cardH + gap) - (gap/2) - (thickness/2)}px`;
                        line.style.width = `${cardW + gap}px`; 
                        line.style.height = `${thickness}px`;
                        layer.appendChild(line);
                    }
                }
            }

            // Vertical Partitions (열 사이의 세로선)
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c <= cols; c++) {
                    const id = `r${r}c${c}`;
                    const isActive = (partitions.v || []).includes(id);
                    
                    // Trigger area
                    const trigger = document.createElement('div');
                    trigger.className = 'partition-trigger';
                    trigger.style.left = `${offset + c * (cardW + gap) - (gap/2) - 10}px`;
                    trigger.style.top = `${offset + r * (cardH + gap)}px`;
                    trigger.style.width = `20px`; trigger.style.height = `${cardH}px`;
                    trigger.onclick = () => togglePartition('v', id);
                    wrapper.appendChild(trigger);

                    if (isActive) {
                        const line = document.createElement('div');
                        line.className = 'partition';
                        line.style.left = `${offset + c * (cardW + gap) - (gap/2) - (thickness/2)}px`;
                        line.style.top = `${offset + r * (cardH + gap) - (gap/2)}px`;
                        line.style.width = `${thickness}px`; 
                        line.style.height = `${cardH + gap}px`;
                        layer.appendChild(line);
                    }
                }
            }
        }

        function togglePartition(type, id) {
            if (currentMode !== 'edit') return;
            if (!partitions[type]) partitions[type] = [];
            const list = partitions[type];
            if (list.includes(id)) partitions[type] = list.filter(x => x !== id);
            else partitions[type].push(id);
            renderGrid();
        }

        function openEditModal(r, c, t) {
            activeEditCell = { r, c };
            document.getElementById('edit-modal').style.display = 'flex';
            document.getElementById('modal-title').innerText = `${r+1}행 ${c+1}열 배치 설정`;
            
            const select = document.getElementById('select-teacher-list');
            select.value = t ? t.name : "";
            document.getElementById('btn-remove-teacher').style.display = t ? 'block' : 'none';
        }

        function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }

        function applyTeacher() {
            const select = document.getElementById('select-teacher-list');
            const name = select.value;
            if (!name) return closeModal();
            
            const selectedOption = select.options[select.selectedIndex];
            const subject = selectedOption.dataset.subject || "";

            localLayout = localLayout.filter(x => !(x.row_index === activeEditCell.r && x.col_index === activeEditCell.c));
            localLayout.push({
                id: 'T' + Date.now(),
                name,
                subject,
                dept: currentDept,
                row_index: activeEditCell.r,
                col_index: activeEditCell.c
            });
            renderGrid();
            closeModal();
        }

        function removeTeacher() {
            localLayout = localLayout.filter(x => !(x.row_index === activeEditCell.r && x.col_index === activeEditCell.c));
            renderGrid();
            closeModal();
        }

        async function saveAllSettings() {
            showToast("데이터 저장 중...");
            try {
                await _supabase.from('t_partition').upsert({
                    dept: currentDept,
                    rows: rows,
                    cols: cols,
                    partitions: partitions
                }, { onConflict: 'dept' });

                await _supabase.from('t_teacher').delete().eq('dept', currentDept);
                if(localLayout.length > 0) {
                    const saveTarget = localLayout.map(t => ({
                        name: t.name,
                        subject: t.subject,
                        dept: currentDept,
                        row_index: t.row_index,
                        col_index: t.col_index
                    }));
                    await _supabase.from('t_teacher').insert(saveTarget);
                }
                showToast("저장 완료");
            } catch (err) {
                console.error(err);
                showToast("저장 실패");
            }
        }

        async function sendCall(id, name, dept) {
            showToast(`${name} 선생님 호출 중...`);
            await _supabase.from('t_calls').insert([{ id: 'C'+Date.now(), name, dept, call_time: new Date().toISOString() }]);
            showToast("호출 완료");
            speak(`${name} 선생님을 호출했습니다.`);
        }

        function showToast(msg) {
            const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        function speak(text) {
            const u = new SpeechSynthesisUtterance(text); u.lang = 'ko-KR';
            window.speechSynthesis.speak(u);
        }

        let channel = null;
        function startListening() {
            channel = _supabase.channel('calls').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 't_calls' }, payload => {
                if (payload.new.dept === currentDept) {
                    document.getElementById('popup-name').innerText = payload.new.name;
                    document.getElementById('call-popup').style.display = 'block';
                    speak(`${payload.new.name} 선생님, 호출입니다.`);
                    setTimeout(() => document.getElementById('call-popup').style.display = 'none', 7000);
                }
            }).subscribe();
        }
        function stopListening() { if(channel) _supabase.removeChannel(channel); }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            const btn = document.getElementById(`btn-${mode}`);
            if(btn) btn.classList.add('active');
            
            document.getElementById('edit-header').style.display = (mode === 'edit') ? 'flex' : 'none';
            showDashboard();
        }

        function autoScale() {
            const outer = document.getElementById('grid-outer-container');
            const wrapper = document.getElementById('grid-wrapper');
            if (!outer || !wrapper || document.getElementById('grid-view').style.display === 'none') return;
            const scale = Math.min((outer.clientWidth - 40) / wrapper.offsetWidth, (outer.clientHeight - 40) / wrapper.offsetHeight);
            wrapper.style.transform = `scale(${scale})`;
        }
    </script>
</body>
</html>
