<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교사 호출 시스템 - 장유고등학교</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #020617;
            --sidebar-bg: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --card-bg: #1e293b;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --accent: #10b981; 
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; background-color: var(--bg); color: var(--text-main);
            display: flex; height: 100vh; width: 100vw; overflow: hidden;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* 로그인 오버레이 */
        #login-overlay {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            display: flex; justify-content: center; align-items: center; z-index: 5000;
        }
        .login-box {
            background: var(--sidebar-bg); padding: 3rem; border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 400px; text-align: center;
        }
        .login-box input {
            width: 100%; padding: 1.2rem; margin-bottom: 1rem; background: #1e293b;
            border: 1px solid #334155; border-radius: 1rem; color: white; font-size: 1.1rem;
        }
        .login-box button {
            width: 100%; padding: 1.2rem; background: var(--primary); color: white;
            border: none; border-radius: 1rem; font-weight: 800; cursor: pointer; font-size: 1.2rem;
        }

        /* 사이드바 */
        nav {
            width: 280px; background: var(--sidebar-bg); padding: 2.5rem 1.5rem;
            display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0; text-align: center;
        }
        .sidebar-header { margin-bottom: 3rem; }
        .sidebar-header h1 { font-size: 1.6rem; font-weight: 800; margin: 0; color: white; line-height: 1.2; }
        .sidebar-header p { font-size: 1rem; color: var(--text-dim); margin-top: 8px; font-weight: 600; }

        .menu-item {
            padding: 1.2rem; border-radius: 1rem; cursor: pointer; margin-bottom: 0.8rem;
            color: var(--text-dim); font-weight: 700; transition: 0.2s;
            font-size: 1.1rem;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid transparent;
        }
        .menu-item.active { background: rgba(99, 102, 241, 0.15); border: 1px solid var(--primary); color: var(--primary); }

        /* 메인 컨텐츠 영역 */
        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; padding: 2rem; }

        /* 부서 대시보드 */
        #dashboard-view { flex: 1; display: flex; flex-direction: column; text-align: center; }
        .dashboard-title {
            display: inline-block; width: 100%; text-align: center; font-size: 2.2rem; font-weight: 800; color: var(--accent);
            margin-bottom: 2rem; background: rgba(16, 185, 129, 0.1); padding: 15px; border-radius: 1rem;
            animation: fadeIn 0.5s ease-out;
        }
        #dept-dashboard {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem; overflow-y: auto; padding-bottom: 2rem;
        }
        .dept-card {
            background: var(--card-bg); padding: 3rem 2rem; border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.05); cursor: pointer; text-align: center;
            transition: 0.3s;
        }
        .dept-card:hover { transform: translateY(-10px); border-color: var(--primary); background: rgba(99, 102, 241, 0.05); }
        .dept-card h3 { font-size: 1.8rem; margin: 0; color: #fff; font-weight: 900; }

        /* 배치도 컨테이너 */
        #grid-view { flex: 1; display: none; flex-direction: column; height: 100%; }
        #grid-outer-container {
            flex: 1; width: 100%; height: 100%; position: relative;
            background: rgba(15, 23, 42, 0.5); border-radius: 2.5rem; 
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        #grid-wrapper { position: relative; display: inline-block; transition: transform 0.1s ease-out; transform-origin: center center; }
        #grid-container { display: grid; position: relative; z-index: 10; }

        /* 좌석 카드 */
        .seat-card {
            background: #1e293b; border-radius: 1.2rem; text-align: center;
            border: 2px solid #334155; display: flex; flex-direction: column; justify-content: center;
            transition: 0.2s; cursor: pointer; position: relative; z-index: 10; padding: 10px;
        }
        .seat-card h3 { font-size: 3.5rem; margin: 0; font-weight: 900; color: #fff; line-height: 1.1; }
        .seat-card p { font-size: 1.8rem; color: var(--primary); margin: 12px 0 0 0; font-weight: 800; }
        .seat-card.disabled { opacity: 0.3; pointer-events: none; filter: grayscale(1); }
        .seat-card.empty { background: rgba(255,255,255,0.02); border: 2px dashed rgba(255,255,255,0.1); cursor: default; }
        .seat-card.empty h3, .seat-card.empty p { display: none; }

        /* 파티션 */
        .partition { position: absolute; background: #64748b; z-index: 5; pointer-events: none; opacity: 1; border-radius: 3px; }
        .partition-trigger { position: absolute; background: transparent; cursor: pointer; z-index: 30; display: none; }
        .edit-mode .partition-trigger { display: block; }

        /* 안내 문구 */
        #call-instruction {
            text-align: center; font-size: 2.2rem; font-weight: 800; color: var(--accent);
            margin-bottom: 1.5rem; animation: fadeIn 0.5s ease-out;
            background: rgba(16, 185, 129, 0.1); padding: 15px; border-radius: 1rem;
        }

        /* 팝업 */
        #call-popup {
            display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98);
            z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
            border: 20px solid var(--primary); text-align: center;
        }
        .popup-content h1 { font-size: 12rem; margin: 0; color: white; animation: pulse 1s infinite; font-weight: 900; }
        .popup-content p { font-size: 4rem; color: var(--text-dim); font-weight: 800; margin-top: 2rem; }

        /* 수신 모니터 */
        #teacher-view { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .monitor-box {
            width: 90%; height: 80%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--sidebar-bg); border-radius: 4rem; border: 4px solid var(--primary); box-shadow: 0 0 50px var(--primary-glow);
            text-align: center; padding: 2rem;
        }
        #monitor-status { font-size: 10rem; font-weight: 900; margin: 0; color: white; line-height: 1; }
        .monitor-badge { color: var(--accent); font-size: 2.5rem; font-weight: 800; margin-top: 3rem; display: flex; align-items: center; gap: 1rem; }
        .dot { width: 25px; height: 25px; background: var(--accent); border-radius: 50%; animation: pulse 1s infinite; }

        #toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 1rem 3rem; border-radius: 3rem;
            font-weight: 800; z-index: 10000; display: none; font-size: 1.2rem;
        }

        #edit-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 6000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--sidebar-bg); padding: 3rem; border-radius: 2rem; width: 500px;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div id="toast">알림</div>

    <div id="login-overlay">
        <div class="login-box">
            <h1 style="color:white; font-size:2.5rem; font-weight:900; margin-bottom:0.5rem;">교사 호출 시스템</h1>
            <p style="color:var(--text-dim); margin-bottom:3rem; font-size:1.2rem; font-weight:700;">장유고등학교</p>
            <input type="text" id="login-id" placeholder="아이디">
            <input type="password" id="login-pw" placeholder="비밀번호">
            <button onclick="attemptLogin()">시스템 접속</button>
            <p id="login-error" style="color: var(--danger); margin-top: 1.5rem; display: none; font-weight: 700;"></p>
        </div>
    </div>

    <nav id="sidebar" style="display: none;">
        <div class="sidebar-header">
            <h1>교사 호출 시스템</h1>
            <p>장유고등학교</p>
        </div>
        <div id="btn-student" class="menu-item" onclick="switchMode('student')">🏢 부서별 호출</div>
        <div id="btn-teacher" class="menu-item" onclick="switchMode('teacher')">🔔 실시간 수신 모니터</div>
        <div id="btn-edit" class="menu-item" onclick="switchMode('edit')">🛠️ 배치도 편집</div>
        <button onclick="location.reload()" style="margin-top: auto; background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); padding: 1.2rem; border-radius: 1rem; cursor: pointer; font-weight: 800; font-size: 1.1rem; width: 100%;">로그아웃</button>
    </nav>

    <main id="main-content" style="display: none;">
        <div id="dashboard-view">
            <div class="dashboard-title">부서를 선택해 주세요</div>
            <div id="dept-dashboard"></div>
        </div>

        <div id="grid-view">
            <div id="edit-header" style="display: none; background: #1e293b; padding: 1.2rem; border-radius: 1.5rem; margin-bottom: 1.5rem; align-items: center; gap: 1.5rem; border: 2px solid var(--primary);">
                <div style="display:flex; align-items:center; gap:0.8rem; font-weight:700;">
                    <span>행:</span>
                    <input type="number" id="input-rows" value="4" style="width:60px; padding: 5px; background:#0f172a; border:1px solid #334155; color:white; font-size:1.1rem;">
                    <span>열:</span>
                    <input type="number" id="input-cols" value="6" style="width:60px; padding: 5px; background:#0f172a; border:1px solid #334155; color:white; font-size:1.1rem;">
                    <button onclick="updateGridSize()" style="background:#334155; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:700;">그리드 적용</button>
                </div>
                <div style="flex:1; text-align:right;">
                    <button onclick="saveAllSettings()" style="background:var(--primary); color:white; border:none; padding:12px 24px; border-radius:12px; font-weight:800; cursor:pointer; font-size:1.1rem;">배치도 최종 저장</button>
                </div>
            </div>
            
            <div id="grid-header-row" style="display:flex; justify-content: space-between; align-items: center; margin-bottom:1.5rem; gap: 20px;">
                <button onclick="showDashboard()" style="background:rgba(99, 102, 241, 0.1); border:1px solid var(--primary); color:var(--primary); padding: 0.8rem 1.5rem; border-radius: 1rem; font-weight:800; cursor:pointer; font-size: 1.1rem; flex-shrink: 0;">◀ 부서 목록으로</button>
                <h2 id="view-title" style="margin:0; font-weight:900; font-size: 2.5rem; color: var(--primary); text-align: right; flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">부서명</h2>
            </div>

            <div id="call-instruction" style="display:none;">아래의 선생님 이름을 누르면 호출됩니다.</div>

            <div id="grid-outer-container">
                <div id="grid-wrapper">
                    <div id="grid-container"></div>
                    <div id="partition-layer" style="position: absolute; inset: 0; pointer-events:none;"></div>
                </div>
            </div>
        </div>

        <div id="teacher-view">
            <div class="monitor-box">
                <p style="color: var(--text-dim); font-size: 2rem; font-weight: 700; margin-bottom: 2rem;">현재 수신 부서</p>
                <h1 id="monitor-status">부서명</h1>
                <div class="monitor-badge">
                    <div class="dot"></div>
                    실시간 호출 대기 중
                </div>
            </div>
        </div>

        <div id="call-popup">
            <div class="popup-content">
                <h1 id="popup-name">교사명</h1>
                <p id="popup-status">호출 대기 중...</p>
            </div>
        </div>
    </main>

    <div id="edit-modal">
        <div class="modal-content">
            <h2 style="margin-top:0; color:white; font-weight:900;">교사 자리 배치</h2>
            <p id="modal-pos" style="color:var(--text-dim); font-size:1.1rem; margin-bottom:2rem;"></p>
            <select id="teacher-dropdown" style="width:100%; padding:1.2rem; margin-bottom: 2rem; background:#1e293b; color:white; border:2px solid #334155; border-radius:1rem; font-size:1.2rem;"></select>
            <div style="display:flex; flex-direction:column; gap:1rem;">
                <button onclick="applyTeacher()" style="padding:1.2rem; background:var(--primary); color:white; border:none; border-radius:1rem; cursor:pointer; font-weight:800; font-size:1.2rem;">이 자리에 배치</button>
                <button onclick="removeTeacher()" id="btn-remove-teacher" style="padding:1rem; background:rgba(239, 68, 68, 0.1); border:1px solid var(--danger); color:var(--danger); border-radius:1rem; cursor:pointer; font-weight:800;">자리 비우기</button>
                <button onclick="closeModal()" style="padding:1rem; background:#334155; color:white; border:none; border-radius:1rem; cursor:pointer; font-weight:700;">취소</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://tonuqhqyeqgjbyeihjid.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JVBFWd4KQ13j_Y-wN-5-7A_-Gm57cZw';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null, currentMode = 'student', currentDept = null;
        let gridRows = 4, gridCols = 6, partitions = { v: [], h: [] };
        let localTeachers = [], activeEditCell = { r: 0, c: 0 }, realTimeChannel = null;
        let isCallingLock = false;

        // 효과음 생성기 (전자음)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playChime() {
            const playNote = (freq, start, duration) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, start);
                gain.gain.setValueAtTime(0.3, start); // 띵동 소리 크기 조절 (0.1 -> 0.3)
                gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(start);
                osc.stop(start + duration);
            };
            const now = audioCtx.currentTime;
            playNote(783.99, now, 0.8); // G5 (띵)
            playNote(659.25, now + 0.4, 1.2); // E5 (동)
        }

        // 한국 시간 포맷터 (YYYY-MM-DD HH:mm:ss.SS)
        function getKSTTime() {
            const now = new Date();
            const offset = now.getTimezoneOffset() * 60000;
            const kstDate = new Date(now.getTime() - offset + (9 * 3600000)); // 현재 UTC + 9시간
            
            const pad = (n) => n.toString().padStart(2, '0');
            const ms = now.getMilliseconds().toString().padStart(3, '0').substring(0, 2); // 소수점 둘째자리까지

            const year = now.getFullYear();
            const month = pad(now.getMonth() + 1);
            const day = pad(now.getDate());
            const hours = pad(now.getHours());
            const minutes = pad(now.getMinutes());
            const seconds = pad(now.getSeconds());

            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}.${ms}`;
        }

        async function attemptLogin() {
            const id = document.getElementById('login-id').value;
            const pw = document.getElementById('login-pw').value;
            const { data, error } = await _supabase.from('t_user').select('*').eq('user_id', id).eq('user_pw', pw).maybeSingle();
            if (data) { currentUser = data; initApp(); } 
            else { document.getElementById('login-error').innerText = "계정 정보가 일치하지 않습니다."; document.getElementById('login-error').style.display = 'block'; }
        }

        async function initApp() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('main-content').style.display = 'flex';
            await fetchDeptList();

            if (currentUser.grade == 1) { 
                document.getElementById('btn-student').style.display = 'flex';
                document.getElementById('btn-teacher').style.display = 'flex';
                document.getElementById('btn-edit').style.display = 'flex';
                switchMode('student');
            } else if (currentUser.grade == 2) { 
                document.getElementById('btn-teacher').style.display = 'flex';
                switchMode('teacher');
            } else { 
                document.getElementById('btn-student').style.display = 'flex';
                switchMode('student');
            }
            window.addEventListener('resize', autoScale);
        }

        async function fetchDeptList() {
            const { data } = await _supabase.from('t_dept').select('name');
            const container = document.getElementById('dept-dashboard');
            if(!data) return;
            container.innerHTML = data.map(dept => `
                <div class="dept-card" onclick="selectDept('${dept.name}')">
                    <div style="font-size: 4rem; margin-bottom:1.5rem;">🏢</div>
                    <h3>${dept.name}</h3>
                </div>
            `).join('');
        }

        async function selectDept(deptName) {
            currentDept = deptName;
            document.getElementById('view-title').innerText = deptName;
            document.getElementById('dashboard-view').style.display = 'none';
            
            const instruction = document.getElementById('call-instruction');
            instruction.style.display = (currentMode === 'student') ? 'block' : 'none';

            if (currentMode === 'teacher') {
                document.getElementById('teacher-view').style.display = 'flex';
                document.getElementById('monitor-status').innerText = deptName;
                startListening();
            } else {
                document.getElementById('grid-view').style.display = 'flex';
                await loadDeptData();
            }
        }

        async function loadDeptData() {
            const { data: pData } = await _supabase.from('t_partition').select('*').eq('dept', currentDept).maybeSingle();
            if (pData) { gridRows = pData.rows || 4; gridCols = pData.cols || 6; partitions = pData.partitions || { v: [], h: [] }; }
            else { gridRows = 4; gridCols = 6; partitions = { v: [], h: [] }; }
            const { data: tData } = await _supabase.from('t_teacher').select('*').eq('dept', currentDept);
            localTeachers = tData || [];
            renderGrid();
        }

        function renderGrid() {
            const container = document.getElementById('grid-container');
            const wrapper = document.getElementById('grid-wrapper');
            container.innerHTML = '';
            if (currentMode === 'edit') wrapper.classList.add('edit-mode'); else wrapper.classList.remove('edit-mode');
            
            const gap = 20, cardW = 200, cardH = 160;
            container.style.gridTemplateRows = `repeat(${gridRows}, ${cardH}px)`;
            container.style.gridTemplateColumns = `repeat(${gridCols}, ${cardW}px)`;
            container.style.gap = `${gap}px`;

            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c < gridCols; c++) {
                    const teacher = localTeachers.find(t => t.row_index === r && t.col_index === c);
                    const seat = document.createElement('div');
                    seat.className = teacher ? 'seat-card' : 'seat-card empty';
                    if(isCallingLock && currentMode === 'student') seat.classList.add('disabled');
                    if (teacher) {
                        seat.innerHTML = `<h3>${teacher.name}</h3><p>${teacher.subject || ''}</p>`;
                        seat.onclick = () => (currentMode === 'edit') ? openEditModal(r, c, teacher) : initiateCall(teacher.name);
                    } else if (currentMode === 'edit') {
                        seat.onclick = () => openEditModal(r, c, null);
                    }
                    container.appendChild(seat);
                }
            }
            renderPartitions(cardW, cardH, gap);
            setTimeout(autoScale, 100);
        }

        async function initiateCall(name) {
            if(isCallingLock) return;
            isCallingLock = true;
            renderGrid();
            const popup = document.getElementById('call-popup');
            const pName = document.getElementById('popup-name');
            const pStatus = document.getElementById('popup-status');
            pName.innerText = name;
            pStatus.innerText = "선생님을 호출 중입니다...";
            pStatus.style.color = "var(--primary)";
            popup.style.display = 'flex';
            
            // 데이터베이스에 한국 시간 로그 남기기
            await _supabase.from('t_calls').insert([{ 
                name, 
                dept: currentDept, 
                call_time: getKSTTime() 
            }]);

            setTimeout(() => { popup.style.display = 'none'; isCallingLock = false; renderGrid(); }, 3000);
        }

        function triggerCallEffect(name) {
            if(currentMode !== 'teacher') return;
            const popup = document.getElementById('call-popup');
            const pName = document.getElementById('popup-name');
            const pStatus = document.getElementById('popup-status');
            pName.innerText = name;
            pStatus.innerText = "선생님, 호출입니다!";
            pStatus.style.color = "var(--text-dim)";
            popup.style.display = 'flex';
            
            playChime(); // 강화된 볼륨의 효과음
            
            setTimeout(() => {
                const msg = new SpeechSynthesisUtterance(`${name} 선생님.`);
                msg.lang = 'ko-KR'; 
                msg.rate = 0.9;
                window.speechSynthesis.speak(msg);
            }, 600);

            setTimeout(() => { popup.style.display = 'none'; }, 6000);
        }

        function renderPartitions(cardW, cardH, gap) {
            const layer = document.getElementById('partition-layer');
            const wrapper = document.getElementById('grid-wrapper');
            layer.innerHTML = '';
            document.querySelectorAll('.partition-trigger').forEach(el => el.remove());
            const thickness = 6;
            const extraLength = 4;

            for (let r = 0; r <= gridRows; r++) {
                for (let c = 0; c < gridCols; c++) {
                    const id = `r${r}c${c}`;
                    if (currentMode === 'edit') {
                        const trg = document.createElement('div');
                        trg.className = 'partition-trigger';
                        trg.style.left = `${c * (cardW + gap)}px`;
                        trg.style.top = `${r * (cardH + gap) - (gap/2) - 15}px`;
                        trg.style.width = `${cardW}px`; trg.style.height = `30px`;
                        trg.onclick = () => togglePartition('h', id);
                        wrapper.appendChild(trg);
                    }
                    if ((partitions.h || []).includes(id)) {
                        const line = document.createElement('div');
                        line.className = 'partition';
                        line.style.left = `${c * (cardW + gap) - (gap/2) - (extraLength/2)}px`;
                        line.style.top = `${r * (cardH + gap) - (gap/2) - (thickness/2)}px`;
                        line.style.width = `${cardW + gap + extraLength}px`; line.style.height = `${thickness}px`;
                        layer.appendChild(line);
                    }
                }
            }
            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c <= gridCols; c++) {
                    const id = `r${r}c${c}`;
                    if (currentMode === 'edit') {
                        const trg = document.createElement('div');
                        trg.className = 'partition-trigger';
                        trg.style.left = `${c * (cardW + gap) - (gap/2) - 15}px`;
                        trg.style.top = `${r * (cardH + gap)}px`;
                        trg.style.width = `30px`; trg.style.height = `${cardH}px`;
                        trg.onclick = () => togglePartition('v', id);
                        wrapper.appendChild(trg);
                    }
                    if ((partitions.v || []).includes(id)) {
                        const line = document.createElement('div');
                        line.className = 'partition';
                        line.style.left = `${c * (cardW + gap) - (gap/2) - (thickness/2)}px`;
                        line.style.top = `${r * (cardH + gap) - (gap/2) - (extraLength/2)}px`;
                        line.style.width = `${thickness}px`; line.style.height = `${cardH + gap + extraLength}px`;
                        layer.appendChild(line);
                    }
                }
            }
        }

        function togglePartition(type, id) {
            if (!partitions[type]) partitions[type] = [];
            if (partitions[type].includes(id)) partitions[type] = partitions[type].filter(x => x !== id);
            else partitions[type].push(id);
            renderGrid();
        }

        function openEditModal(r, c, teacher) {
            activeEditCell = { r, c };
            document.getElementById('modal-pos').innerText = `${r + 1}행 ${c + 1}열 설정 중`;
            const dropdown = document.getElementById('teacher-dropdown');
            dropdown.innerHTML = '<option value="">좌석 비우기</option>';
            localTeachers.sort((a,b) => a.name.localeCompare(b.name)).forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.id; opt.innerText = `${t.name} (${t.subject || ''})`;
                if (teacher && t.id === teacher.id) opt.selected = true;
                dropdown.appendChild(opt);
            });
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }
        function applyTeacher() {
            const selectedId = document.getElementById('teacher-dropdown').value;
            localTeachers.forEach(t => { if(t.row_index === activeEditCell.r && t.col_index === activeEditCell.c) { t.row_index = null; t.col_index = null; } });
            if (selectedId) { const target = localTeachers.find(t => t.id == selectedId); target.row_index = activeEditCell.r; target.col_index = activeEditCell.c; }
            renderGrid(); closeModal();
        }
        function removeTeacher() { localTeachers.forEach(t => { if(t.row_index === activeEditCell.r && t.col_index === activeEditCell.c) { t.row_index = null; t.col_index = null; } }); renderGrid(); closeModal(); }

        function updateGridSize() {
            gridRows = parseInt(document.getElementById('input-rows').value) || 4;
            gridCols = parseInt(document.getElementById('input-cols').value) || 6;
            renderGrid();
        }

        async function saveAllSettings() {
            showToast("저장 중...");
            await _supabase.from('t_partition').upsert({ dept: currentDept, rows: gridRows, cols: gridCols, partitions: partitions });
            for (const t of localTeachers) await _supabase.from('t_teacher').update({ row_index: t.row_index, col_index: t.col_index }).eq('id', t.id);
            showToast("성공적으로 저장되었습니다.");
        }

        function startListening() {
            realTimeChannel = _supabase.channel('public:t_calls')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 't_calls' }, payload => {
                    if (payload.new.dept === currentDept) triggerCallEffect(payload.new.name);
                }).subscribe();
        }
        function stopListening() { if(realTimeChannel) _supabase.removeChannel(realTimeChannel); }
        
        function showDashboard() { 
            currentDept = null; 
            document.getElementById('dashboard-view').style.display = 'block'; 
            document.getElementById('grid-view').style.display = 'none'; 
            document.getElementById('teacher-view').style.display = 'none'; 
            document.getElementById('call-instruction').style.display = 'none';
            stopListening(); 
        }

        function switchMode(mode) { 
            currentMode = mode; 
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active')); 
            const btn = document.getElementById(`btn-${mode}`);
            if(btn) btn.classList.add('active'); 
            document.getElementById('edit-header').style.display = (mode === 'edit') ? 'flex' : 'none'; 
            showDashboard(); 
        }

        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }

        function autoScale() { 
            const outer = document.getElementById('grid-outer-container'); 
            const wrapper = document.getElementById('grid-wrapper'); 
            if (!outer || !wrapper || document.getElementById('grid-view').style.display === 'none') return; 
            const scale = Math.min((outer.clientWidth * 0.92) / wrapper.offsetWidth, (outer.clientHeight * 0.92) / wrapper.offsetHeight); 
            wrapper.style.transform = `scale(${scale})`; 
        }
    </script>
</body>
</html>
