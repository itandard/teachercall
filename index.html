<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 교사 호출기</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 사이드바 메뉴 */
        nav {
            width: 260px;
            background: #1e293b;
            color: white;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .menu-item {
            padding: 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .menu-item:hover { background: rgba(255,255,255,0.1); }
        .menu-item.active { background: var(--primary); border-color: var(--primary); }

        /* 메인 영역 */
        main {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        /* 격자 배치도 스타일 */
        #grid-container {
            display: grid;
            gap: 1rem;
            margin-top: 1rem;
        }

        .seat-card {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            aspect-ratio: 1.2 / 1;
        }

        .seat-card:active { transform: scale(0.95); }
        .seat-card.assigned:hover { border-color: var(--primary); }
        .seat-card h3 { margin: 0; font-size: 1.2rem; }
        .seat-card p { margin: 0.5rem 0 0; font-size: 0.9rem; color: #64748b; }
        .seat-card.empty { opacity: 0.3; cursor: default; }

        /* 교사용 수신 화면 */
        #monitor-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            background: #dcfce7;
            color: #166534;
            font-weight: bold;
            margin-bottom: 2rem;
        }

        #call-log {
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary);
            min-height: 4.5rem;
        }

        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <nav>
        <h2 style="margin:0 0 1rem 0; font-size: 1.5rem;">선생님 호출기</h2>
        <div id="btn-student" class="menu-item active" onclick="switchMode('student')">
            <b>학생용 모드</b><br><small>교무실 밖 태블릿</small>
        </div>
        <div id="btn-teacher" class="menu-item" onclick="switchMode('teacher')">
            <b>교사용 모드</b><br><small>교무실 안 모니터</small>
        </div>
        <hr style="width:100%; opacity:0.1;">
        <label>부서 선택</label>
        <select id="dept-select" onchange="loadLayout()" style="padding:0.5rem; border-radius:0.3rem;">
            <option value="교무부">교무부</option>
            <option value="1학년부">1학년부</option>
            <option value="2학년부">2학년부</option>
        </select>
    </nav>

    <main>
        <!-- 학생용: 배치도 화면 -->
        <div id="student-view">
            <h1 id="view-title">교무부 좌석 배치도</h1>
            <p>호출하실 선생님의 자리를 터치해 주세요.</p>
            <div id="grid-container"></div>
        </div>

        <!-- 교사용: TTS 수신 화면 -->
        <div id="teacher-view" style="display: none;">
            <div id="monitor-view">
                <div class="status-badge">● 실시간 수신 중</div>
                <div id="call-log">수신 대기 중...</div>
                <p style="margin-top: 2rem; color: #94a3b8;">새로운 호출이 발생하면 음성으로 안내합니다.</p>
            </div>
        </div>
    </main>

    <script>
        // 1. Supabase 초기화
        const SUPABASE_URL = 'https://tonuqhqyeqgjbyeihjid.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JVBFWd4KQ13j_Y-wN-5-7A_-Gm57cZw';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentMode = 'student';
        let realtimeChannel = null;

        // 2. 모드 전환 함수
        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');

            if (mode === 'student') {
                document.getElementById('student-view').style.display = 'block';
                document.getElementById('teacher-view').style.display = 'none';
                stopListening();
            } else {
                document.getElementById('student-view').style.display = 'none';
                document.getElementById('teacher-view').style.display = 'flex';
                // 브라우저 TTS 권한을 위해 빈 소리 재생
                speak(""); 
                startListening();
            }
        }

        // 3. 배치도 로드 (학생용)
        async function loadLayout() {
            const dept = document.getElementById('dept-select').value;
            document.getElementById('view-title').innerText = `${dept} 좌석 배치도`;

            const { data: teachers, error } = await _supabase
                .from('t_teacher')
                .select('*')
                .eq('dept', dept);

            if (error) return;

            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            
            // 4행 6열 예시 (편집기에서 설정한 행/열 크기에 맞춤)
            container.style.gridTemplateColumns = 'repeat(6, 1fr)';

            // 24개 칸 생성
            for (let i = 0; i < 24; i++) {
                const r = Math.floor(i / 6);
                const c = i % 6;
                const t = teachers.find(teacher => teacher.row_index === r && teacher.col_index === c);

                const card = document.createElement('div');
                card.className = t ? 'seat-card assigned' : 'seat-card empty';
                
                if (t) {
                    card.innerHTML = `<h3>${t.name}</h3><p>${t.subject || ''}</p>`;
                    card.onclick = () => sendCall(t.id, t.name);
                } else {
                    card.innerHTML = `<small style="color:#ccc">${r},${c}</small>`;
                }
                container.appendChild(card);
            }
        }

        // 4. 호출 보내기 (학생용 -> DB INSERT)
        async function sendCall(teacherId, teacherName) {
            const { error } = await _supabase
                .from('t_calls')
                .insert([{ id: teacherId }]);

            if (error) {
                alert('호출 실패');
            } else {
                // 시각적 피드백
                const log = document.createElement('div');
                alert(`${teacherName} 선생님을 호출했습니다.`);
            }
        }

        // 5. 실시간 감지 시작 (교사용)
        function startListening() {
            if (realtimeChannel) return;

            realtimeChannel = _supabase
                .channel('any')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 't_calls' }, async (payload) => {
                    const teacherId = payload.new.id;
                    
                    // 호출된 선생님 이름 가져오기
                    const { data } = await _supabase
                        .from('t_teacher')
                        .select('name')
                        .eq('id', teacherId)
                        .single();

                    if (data) {
                        handleIncomingCall(data.name);
                    }
                })
                .subscribe();
        }

        function stopListening() {
            if (realtimeChannel) {
                _supabase.removeChannel(realtimeChannel);
                realtimeChannel = null;
            }
        }

        // 6. 호출 처리 및 TTS (교사용)
        function handleIncomingCall(name) {
            const display = document.getElementById('call-log');
            const message = `${name} 선생님 호출`;
            
            display.innerText = message;
            display.classList.add('pulse');
            
            // TTS 출력
            speak(message);

            // 5초 후 메시지 초기화
            setTimeout(() => {
                display.innerText = "수신 대기 중...";
                display.classList.remove('pulse');
            }, 5000);
        }

        // TTS 엔진 함수
        function speak(text) {
            if (typeof SpeechSynthesisUtterance === "undefined") {
                console.warn("이 브라우저는 TTS를 지원하지 않습니다.");
                return;
            }
            
            window.speechSynthesis.cancel(); // 현재 재생 중인 소리 중단
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ko-KR';
            uttr.rate = 1.0;
            uttr.pitch = 1.0;
            window.speechSynthesis.speak(uttr);
        }

        // 초기 실행
        loadLayout();
    </script>
</body>
</html>
