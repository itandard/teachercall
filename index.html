<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>선생님 호출 시스템 - 장유고등학교</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #020617;
            --sidebar-bg: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --card-bg: #1e293b;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --accent: #10b981; 
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --partition-idle: rgba(51, 65, 85, 0.3);
            --partition-active: #64748b;
            --partition-thickness: 6px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; background-color: var(--bg); color: var(--text-main);
            display: flex; height: 100vh; width: 100vw; overflow: hidden;
        }

        /* 로그인 화면 */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            display: flex; justify-content: center; align-items: center; z-index: 5000;
        }
        .login-box {
            background: var(--sidebar-bg); padding: 3rem; border-radius: 2.5rem;
            border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 420px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .login-box h1 { color: #fff; font-size: 2.2rem; font-weight: 900; margin-bottom: 0.3rem; letter-spacing: -1.5px; }
        .login-box p { color: var(--text-dim); margin-bottom: 2.5rem; font-size: 1rem; font-weight: 500; }
        .login-box input {
            width: 100%; padding: 1.2rem; margin-bottom: 1rem;
            background: #1e293b; border: 1px solid #334155; border-radius: 1rem; color: white;
            font-size: 1rem;
        }
        .login-box button {
            width: 100%; padding: 1.2rem; background: var(--primary); color: white;
            border: none; border-radius: 1rem; font-weight: 700; cursor: pointer;
            font-size: 1.1rem; transition: background 0.2s;
        }

        /* 사이드바 */
        nav {
            width: 260px; background: var(--sidebar-bg); padding: 1.5rem 1rem;
            display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05);
        }
        .menu-item {
            padding: 1.2rem 1rem; border-radius: 1rem; cursor: pointer; margin-bottom: 0.5rem;
            background: transparent; border: 1px solid transparent; transition: 0.2s;
            display: none;
        }
        .menu-item:hover { background: rgba(255,255,255,0.03); }
        .menu-item.active { background: rgba(99, 102, 241, 0.15); border-color: var(--primary); color: var(--primary); }

        /* 메인 컨텐츠 영역 */
        main { flex: 1; padding: 1rem 1.5rem; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        /* 부서 선택 카드 */
        #dept-dashboard {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.2rem; margin-top: 2rem;
        }
        .dept-card {
            background: var(--card-bg); padding: 3rem 1.2rem; border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.05); cursor: pointer; text-align: center;
            transition: 0.3s;
        }
        .dept-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        /* 배치도 인터페이스 */
        #grid-view { height: 100%; display: flex; flex-direction: column; }
        #grid-outer-container {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: var(--card-bg); /* 배경색을 카드와 통일하여 여백 최소화 느낌 부여 */
            border-radius: 2rem; overflow: hidden; position: relative;
            margin-top: 1rem; border: 1px solid rgba(255,255,255,0.05);
            padding: 20px; /* 외부 최소 간격 */
        }
        #grid-wrapper { position: relative; padding: 20px; background: var(--card-bg); transform-origin: center center; }
        #grid-container { display: grid; position: relative; z-index: 10; }

        /* 좌석 카드 */
        .seat-card {
            background: #0f172a; border-radius: 1rem; padding: 1rem; text-align: center;
            border: 1px solid #334155; display: flex; flex-direction: column; justify-content: center;
            width: 150px; height: 120px; position: relative; transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .seat-card h3 { margin: 0; font-size: 1.25rem; color: #fff; font-weight: 800; }
        .seat-card p { margin: 0.3rem 0 0; font-size: 0.85rem; color: var(--text-dim); }
        .seat-card.empty { border: 1px dashed #334155; background: rgba(0,0,0,0.1); opacity: 0.2; }

        /* 파티션 선 */
        .partition { position: absolute; background: var(--partition-idle); z-index: 5; pointer-events: none; }
        .partition.active { background: var(--partition-active); z-index: 6; }
        .edit-mode .partition { pointer-events: auto; cursor: pointer; }

        .header-title { font-size: 2.5rem; font-weight: 900; margin: 0; color: #fff; letter-spacing: -1.5px; }
        .header-subtitle { font-size: 1rem; font-weight: 700; color: var(--primary); margin: 0; letter-spacing: 1px; }

        #call-popup {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #020617; padding: 4rem; border-radius: 4rem;
            box-shadow: 0 0 0 100vmax rgba(0,0,0,0.85), 0 0 80px var(--primary-glow);
            z-index: 9999; text-align: center; border: 6px solid var(--primary); width: 90%; max-width: 600px;
        }
    </style>
</head>
<body>

    <!-- 로그인 -->
    <div id="login-overlay">
        <div class="login-box">
            <h1>선생님 호출 시스템</h1>
            <p>장유고등학교</p>
            <input type="text" id="login-id" placeholder="사용자 아이디">
            <input type="password" id="login-pw" placeholder="비밀번호">
            <button onclick="attemptLogin()">로그인</button>
            <p id="login-error" style="color: #ef4444; margin-top: 1.2rem; display: none; font-size: 0.85rem;"></p>
        </div>
    </div>

    <!-- 사이드바 -->
    <nav id="sidebar" style="display: none;">
        <div style="margin-bottom: 2.5rem; padding: 0.5rem;">
            <p style="font-size: 0.75rem; color: var(--text-dim); margin: 0 0 4px 0; font-weight: 600;">JANGYU HIGH SCHOOL</p>
            <h2 id="sidebar-dept-name" style="font-size: 1.6rem; font-weight: 900; color: #fff; margin: 0; line-height: 1.1; letter-spacing: -1px;">부서 정보 로딩중</h2>
            <div id="user-status-tag" style="font-size: 0.75rem; color: var(--accent); margin-top: 0.8rem; font-weight: bold; background: rgba(16, 185, 129, 0.1); padding: 4px 10px; border-radius: 20px; display: inline-flex; align-items: center;">
                <span style="width: 6px; height: 6px; background: var(--accent); border-radius: 50%; margin-right: 6px;"></span>
                실시간 접속중
            </div>
        </div>

        <div id="btn-student" class="menu-item" onclick="switchMode('student')">
            <b>🏢 호출 모드</b><br><small>학생 모드</small>
        </div>
        <div id="btn-teacher" class="menu-item" onclick="switchMode('teacher')">
            <b>🔔 수신 모드</b><br><small>선생님 모드</small>
        </div>
        <div id="btn-edit" class="menu-item" onclick="switchMode('edit')">
            <b>🛠️ 배치도 설정</b><br><small>관리자 모드</small>
        </div>

        <button onclick="location.reload()" style="margin-top: auto; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-dim); padding: 1rem; border-radius: 1rem; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: 0.2s;">
            🚪 로그아웃
        </button>
    </nav>

    <main id="main-content" style="display: none;">
        <!-- 부서 선택 -->
        <div id="dashboard-view">
            <header>
                <h1 class="header-title">부서 선택</h1>
                <p class="header-subtitle">JANGYU HIGH SCHOOL</p>
                <p class="header-desc" style="margin-top:2rem; font-size: 1.1rem; color: var(--text-main);">아래의 부서를 클릭해주세요.</p>
            </header>
            <div id="dept-dashboard"></div>
        </div>

        <!-- 그리드 배치도 -->
        <div id="grid-view" style="display: none;">
            <div id="edit-header" style="display: none; background: var(--primary); color: white; padding: 0.7rem 1.2rem; border-radius: 1rem; margin-bottom: 0.8rem; justify-content: space-between; align-items: center;">
                <div style="font-size: 0.85rem; font-weight: 600;">
                    레이아웃: <input type="number" id="grid-rows" style="width:40px; border-radius:4px; border:none; padding:3px 6px;"> x 
                    <input type="number" id="grid-cols" style="width:40px; border-radius:4px; border:none; padding:3px 6px;">
                    <button onclick="updateGridSize()" style="background: white; color: var(--primary); border: none; padding: 3px 10px; border-radius: 5px; font-weight: bold; margin-left:8px; cursor:pointer;">변경</button>
                </div>
                <button onclick="saveAllSettings()" style="background: #020617; color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-weight: bold;">서버 저장</button>
            </div>

            <div style="display:flex; justify-content: space-between; align-items: flex-end; margin-bottom: 0.5rem;">
                <div>
                    <button onclick="showDashboard()" style="background:none; border:none; color:var(--primary); font-weight:700; cursor:pointer; padding:0; margin-bottom:0.5rem; font-size:1rem;">◀ 다른 부서 선택</button>
                    <h2 id="view-title" class="header-title">부서명</h2>
                </div>
                <div style="text-align: right; padding-bottom: 5px;">
                    <p id="view-desc" style="color:var(--text-dim); margin:0; font-size:1rem; font-weight:500;">성함을 클릭하면 호출됩니다.</p>
                </div>
            </div>

            <div id="grid-outer-container">
                <div id="grid-wrapper">
                    <div id="grid-container"></div>
                    <div id="partition-layer" style="position: absolute; inset: 0; z-index: 20;"></div>
                </div>
            </div>
        </div>

        <!-- 수신 모드 -->
        <div id="teacher-view" style="display: none; flex: 1; align-items: center; justify-content: center;">
            <div style="background: var(--sidebar-bg); padding: 5rem 3rem; border-radius: 3rem; text-align: center; border: 1px solid rgba(255,255,255,0.06); width: 100%; max-width: 650px;">
                <div id="monitor-dept-tag" style="color: var(--accent); font-weight: 800; margin-bottom: 1.5rem; font-size: 1.1rem; letter-spacing: 1px;">● 수신 대기 중</div>
                <h1 style="font-size: 3.2rem; color: #fff; margin: 0; font-weight: 900; letter-spacing: -2px;">호출 수신 모드</h1>
                <p style="color: var(--text-dim); font-size: 1.2rem; margin-top: 1.2rem;">방문객이 호출하면 화면에 즉시 표시됩니다.</p>
                <button onclick="showDashboard()" style="margin-top: 2.5rem; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 1rem 2.5rem; border-radius: 1rem; cursor: pointer; font-weight: 700;">모니터링 부서 변경</button>
            </div>
        </div>

        <!-- 알림 팝업 -->
        <div id="call-popup">
            <span style="font-size: 1.5rem; color: var(--primary); font-weight: 800; display: block; margin-bottom: 1rem; letter-spacing: 2px;">VISITOR ALERT</span>
            <span id="popup-name" style="font-size: 6rem; font-weight: 900; color: #fff; line-height: 1; text-shadow: 0 0 30px var(--primary-glow);">홍길동</span>
            <span style="font-size: 2rem; color: var(--text-dim); display: block; margin-top: 2rem; font-weight: 700;">선생님, 호출입니다!</span>
        </div>
    </main>

    <div id="edit-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:10000; justify-content:center; align-items:center; backdrop-filter: blur(10px);">
        <div style="background:var(--sidebar-bg); padding:2.5rem; border-radius:2.5rem; width:400px; text-align:center; border: 1px solid rgba(255,255,255,0.15);">
            <h3 style="margin-bottom:1.5rem; color:#fff; font-size:1.5rem;">좌석 지정</h3>
            <select id="teacher-picker" style="width:100%; padding:1.2rem; border-radius:1rem; margin-bottom:2.5rem; background:#1e293b; color:white; border:1px solid #334155; font-size:1.1rem;"></select>
            <div style="display:flex; gap:1.2rem;">
                <button onclick="closeEditModal()" style="flex:1; padding:1.2rem; border-radius:1rem; background:#334155; color:white; border:none; font-weight:bold;">취소</button>
                <button onclick="applySeatChange()" style="flex:1; padding:1.2rem; border-radius:1rem; background:var(--primary); color:white; border:none; font-weight:bold;">배정 완료</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://tonuqhqyeqgjbyeihjid.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JVBFWd4KQ13j_Y-wN-5-7A_-Gm57cZw';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null, currentMode = 'student', currentDept = null;
        let rows = 4, cols = 6, partitions = { v: [], h: [] }, localLayout = [];
        let activeEditCoord = { r: 0, c: 0 }, realtimeChannel = null;

        async function attemptLogin() {
            const id = document.getElementById('login-id').value;
            const pw = document.getElementById('login-pw').value;
            if (!id || !pw) return;

            const { data } = await _supabase.from('t_user').select('*').eq('user_id', id).eq('user_pw', pw).maybeSingle();
            if (data) { 
                currentUser = data; 
                initApp(); 
            } else { 
                const err = document.getElementById('login-error');
                err.innerText = "사용자 정보가 일치하지 않습니다."; 
                err.style.display = 'block'; 
            }
        }

        async function initApp() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('main-content').style.display = 'flex';
            
            // 사이드바 부서명 표시 (수정사항 2번)
            document.getElementById('sidebar-dept-name').innerText = currentUser.dept || '교무부';

            // 권한 제어
            if (currentUser.grade == 1) {
                document.getElementById('btn-student').style.display = 'block';
                document.getElementById('btn-teacher').style.display = 'block';
                document.getElementById('btn-edit').style.display = 'block';
                switchMode('student');
            } else if (currentUser.grade == 2) {
                document.getElementById('btn-student').style.display = 'none';
                document.getElementById('btn-teacher').style.display = 'block';
                document.getElementById('btn-edit').style.display = 'none';
                switchMode('teacher');
            } else {
                document.getElementById('btn-student').style.display = 'block';
                document.getElementById('btn-teacher').style.display = 'none';
                document.getElementById('btn-edit').style.display = 'none';
                switchMode('student');
            }

            await fetchDeptList();
            showDashboard();
            window.addEventListener('resize', autoScale);
        }

        async function fetchDeptList() {
            const { data } = await _supabase.from('t_partition').select('dept');
            const uniqueDepts = data ? [...new Set(data.map(d => d.dept))] : ["교무실"];
            const container = document.getElementById('dept-dashboard');
            container.innerHTML = uniqueDepts.map(dept => `
                <div class="dept-card" onclick="selectDept('${dept}')">
                    <div style="font-size: 3rem; margin-bottom: 1.2rem;">🏢</div>
                    <h3 style="margin: 0; color:#fff; font-size: 1.5rem; font-weight:900; letter-spacing:-1px;">${dept}</h3>
                </div>
            `).join('');
        }

        function showDashboard() {
            currentDept = null;
            document.getElementById('dashboard-view').style.display = 'block';
            document.getElementById('grid-view').style.display = 'none';
            document.getElementById('teacher-view').style.display = 'none';
            stopListening();
        }

        async function selectDept(dept) {
            currentDept = dept;
            document.getElementById('dashboard-view').style.display = 'none';
            
            if (currentMode === 'teacher') {
                document.getElementById('teacher-view').style.display = 'flex';
                startListening();
            } else {
                document.getElementById('grid-view').style.display = 'block';
                await loadDeptLayout();
            }
        }

        async function loadDeptLayout() {
            if (!currentDept) return;
            const { data: pData } = await _supabase.from('t_partition').select('*').eq('dept', currentDept).maybeSingle();
            if (pData) {
                rows = pData.rows || 4; cols = pData.cols || 6; partitions = pData.partitions || { v: [], h: [] };
            } else {
                rows = 4; cols = 6; partitions = { v: [], h: [] };
            }
            const { data: tData } = await _supabase.from('t_teacher').select('*');
            localLayout = tData || [];
            renderGrid();
        }

        function renderGrid() {
            document.getElementById('view-title').innerText = currentDept;
            const container = document.getElementById('grid-container');
            const pLayer = document.getElementById('partition-layer');
            const gridView = document.getElementById('grid-view');
            
            container.innerHTML = ''; pLayer.innerHTML = '';
            if (currentMode === 'edit') gridView.classList.add('edit-mode');
            else gridView.classList.remove('edit-mode');

            const gap = 15, cardW = 150, cardH = 120;
            container.style.gridTemplateRows = `repeat(${rows}, ${cardH}px)`;
            container.style.gridTemplateColumns = `repeat(${cols}, ${cardW}px)`;
            container.style.gap = `${gap}px`;

            const deptTeachers = localLayout.filter(t => t.dept === currentDept);
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const t = deptTeachers.find(x => x.row_index === r && x.col_index === c);
                    const card = document.createElement('div');
                    card.className = t ? 'seat-card' : 'seat-card empty';
                    if (t) {
                        card.innerHTML = `<h3>${t.name}</h3><p>${t.subject || ''}</p>`;
                        card.onclick = () => (currentMode === 'edit' ? handleEdit(r, c, t) : sendCall(t.id, t.name, currentDept));
                    } else {
                        card.innerHTML = `<small style="color:#475569;">${r}-${c}</small>`;
                        if (currentMode === 'edit') card.onclick = () => handleEdit(r, c, null);
                    }
                    container.appendChild(card);
                }
            }
            
            const thickness = 6; 
            const wrapOffset = 20; 

            for (let r = 0; r <= rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const id = `r${r}c${c}`;
                    if (partitions.h?.includes(id) || currentMode === 'edit') {
                        const p = document.createElement('div');
                        p.className = `partition ${partitions.h?.includes(id) ? 'active' : ''}`;
                        p.style.left = `${wrapOffset + c * (cardW + gap)}px`;
                        p.style.top = `${wrapOffset + r * (cardH + gap) - (gap / 2) - (thickness / 2)}px`;
                        p.style.width = `${cardW}px`;
                        p.style.height = `${thickness}px`;
                        if (currentMode === 'edit') p.onclick = (e) => togglePartition('h', id, e);
                        pLayer.appendChild(p);
                    }
                }
            }

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c <= cols; c++) {
                    const id = `r${r}c${c}`;
                    if (partitions.v?.includes(id) || currentMode === 'edit') {
                        const p = document.createElement('div');
                        p.className = `partition ${partitions.v?.includes(id) ? 'active' : ''}`;
                        p.style.left = `${wrapOffset + c * (cardW + gap) - (gap / 2) - (thickness / 2)}px`;
                        p.style.top = `${wrapOffset + r * (cardH + gap)}px`;
                        p.style.width = `${thickness}px`;
                        p.style.height = `${cardH}px`;
                        if (currentMode === 'edit') p.onclick = (e) => togglePartition('v', id, e);
                        pLayer.appendChild(p);
                    }
                }
            }
            setTimeout(autoScale, 100);
        }

        function togglePartition(type, id, e) {
            e.stopPropagation();
            if (!partitions[type]) partitions[type] = [];
            if (partitions[type].includes(id)) partitions[type] = partitions[type].filter(i => i !== id);
            else partitions[type].push(id);
            renderGrid();
        }

        async function sendCall(tid, name, dept) {
            const { error } = await _supabase.from('t_calls').insert([{ id: tid, dept: dept, call_time: new Date().toISOString() }]);
            if (!error) { speak(`${name} 선생님을 호출하였습니다.`); }
        }

        function startListening() {
            if (!currentDept) return;
            document.getElementById('monitor-dept-tag').innerText = `● ${currentDept} 수신 모니터링 중`;
            realtimeChannel = _supabase.channel('calls-room').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 't_calls' }, async (payload) => {
                if (payload.new.dept === currentDept) {
                    const { data } = await _supabase.from('t_teacher').select('name').eq('id', payload.new.id).maybeSingle();
                    if (data) showCallPopup(data.name);
                }
            }).subscribe();
        }

        function stopListening() { if (realtimeChannel) _supabase.removeChannel(realtimeChannel); }

        function showCallPopup(name) {
            document.getElementById('popup-name').innerText = name;
            document.getElementById('call-popup').style.display = 'block';
            speak(`${name} 선생님, 방문객이 있습니다.`);
            setTimeout(() => document.getElementById('call-popup').style.display = 'none', 7000);
        }

        function speak(t) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t); u.lang = 'ko-KR'; u.rate = 1.0;
            window.speechSynthesis.speak(u);
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            const targetBtn = document.getElementById(`btn-${mode}`);
            if (targetBtn) targetBtn.classList.add('active');
            
            document.getElementById('edit-header').style.display = (mode === 'edit') ? 'flex' : 'none';
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('grid-view').style.display = 'none';
            document.getElementById('teacher-view').style.display = 'none';

            if (!currentDept) {
                showDashboard();
                return;
            }

            if (mode === 'teacher') {
                document.getElementById('teacher-view').style.display = 'flex';
                startListening();
            } else {
                stopListening();
                document.getElementById('grid-view').style.display = 'block';
                loadDeptLayout();
            }
        }

        // 여백 없이 꽉 채우는 오토스케일링 (수정사항 3번)
        function autoScale() {
            const outer = document.getElementById('grid-outer-container');
            const wrapper = document.getElementById('grid-wrapper');
            if (!outer || !wrapper || document.getElementById('grid-view').style.display === 'none') return;

            const padding = 40; // 최소 안전 여백
            const availableW = outer.clientWidth - padding;
            const availableH = outer.clientHeight - padding;
            
            // 실제 콘텐츠 크기 (패딩 포함)
            const contentW = wrapper.scrollWidth;
            const contentH = wrapper.scrollHeight;

            const scaleW = availableW / contentW;
            const scaleH = availableH / contentH;
            
            // 둘 중 작은 비율을 선택하여 비율 유지하며 최대 확대
            const finalScale = Math.min(scaleW, scaleH);
            
            wrapper.style.transform = `scale(${finalScale})`;
        }

        function handleEdit(r, c, t) {
            if (t) { if (confirm(`${t.name} 선생님 배치를 해제하시겠습니까?`)) { t.row_index = null; t.col_index = null; renderGrid(); } } 
            else { activeEditCoord = { r, c }; openEditModal(); }
        }
        function openEditModal() {
            const picker = document.getElementById('teacher-picker');
            picker.innerHTML = '<option value="">선생님 선택</option>' + localLayout.filter(t => !t.row_index).map(t => `<option value="${t.id}">${t.name} (${t.subject || '담당'})</option>`).join('');
            document.getElementById('edit-modal').style.display = 'flex';
        }
        function closeEditModal() { document.getElementById('edit-modal').style.display = 'none'; }
        function applySeatChange() {
            const tid = document.getElementById('teacher-picker').value;
            const t = localLayout.find(x => x.id == tid);
            if (t) { t.dept = currentDept; t.row_index = activeEditCoord.r; t.col_index = activeEditCoord.c; }
            closeEditModal(); renderGrid();
        }
        async function saveAllSettings() {
            try {
                for (const t of localLayout) {
                    await _supabase.from('t_teacher').update({ dept: t.dept, row_index: t.row_index, col_index: t.col_index }).eq('id', t.id);
                }
                await _supabase.from('t_partition').upsert({ dept: currentDept, rows, cols, partitions });
                alert("설정이 서버에 안전하게 저장되었습니다.");
            } catch (e) { alert("저장 실패: " + e.message); }
        }
        function updateGridSize() {
            rows = parseInt(document.getElementById('grid-rows').value) || rows;
            cols = parseInt(document.getElementById('grid-cols').value) || cols;
            renderGrid();
        }
    </script>
</body>
</html>
